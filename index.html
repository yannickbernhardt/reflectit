<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f5f1e8" />
<title>ReflectIt</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: oklch(0.985 0.004 85);
  --bg-soft: oklch(0.97 0.005 85);
  --ink: oklch(0.22 0.01 260);
  --ink-soft: oklch(0.45 0.01 260);
  --ink-faint: oklch(0.68 0.008 260);
  --line: oklch(0.9 0.006 260);
  --line-soft: oklch(0.94 0.005 260);
  --cool: oklch(0.52 0.09 245);
  --cool-soft: oklch(0.93 0.03 245);
  --warm: oklch(0.66 0.15 55);
  --warm-soft: oklch(0.95 0.04 65);
  --accent-a: oklch(0.66 0.17 55);   /* warm coral */
  --accent-b: oklch(0.60 0.14 340);  /* magenta */
  --accent-c: oklch(0.58 0.13 245);  /* cool blue */
  --grad-hero: linear-gradient(135deg, oklch(0.97 0.035 65) 0%, oklch(0.96 0.04 340) 50%, oklch(0.95 0.04 245) 100%);
  --grad-accent: linear-gradient(135deg, var(--accent-a), var(--accent-b) 60%, var(--accent-c));
  --grad-warm: linear-gradient(135deg, oklch(0.72 0.16 45), oklch(0.64 0.18 25));
  --grad-cool: linear-gradient(135deg, oklch(0.62 0.12 250), oklch(0.55 0.14 280));
  --teacher-bg: oklch(0.19 0.025 265);
  --teacher-bg-2: oklch(0.16 0.03 280);
  --teacher-panel: oklch(0.24 0.025 265);
  --teacher-line: oklch(0.34 0.02 265);
  --teacher-ink: oklch(0.97 0.005 85);
  --teacher-ink-soft: oklch(0.72 0.015 265);
  --mood-1: oklch(0.62 0.18 25);
  --mood-2: oklch(0.72 0.14 45);
  --mood-3: oklch(0.78 0.04 90);
  --mood-4: oklch(0.72 0.12 150);
  --mood-5: oklch(0.62 0.15 160);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; overflow-x: hidden; width: 100%; max-width: 100%; }
body { min-height: 100dvh; }
img, svg, video { max-width: 100%; height: auto; }

/* ===================== Motion tokens & reduced-motion ===================== */
:root {
  --dur-xs: 120ms;
  --dur-sm: 220ms;
  --dur-md: 320ms;
  --dur-lg: 480ms;
  --ease-out: cubic-bezier(0.2, 0.7, 0.2, 1);
  --ease-spring: cubic-bezier(0.34, 1.2, 0.5, 1);
  /* Shadows with multi-layer depth */
  --shadow-sm: 0 1px 2px oklch(0.2 0.02 260 / 0.05), 0 2px 6px -2px oklch(0.2 0.02 260 / 0.08);
  --shadow-md: 0 1px 2px oklch(0.2 0.02 260 / 0.06), 0 8px 20px -8px oklch(0.2 0.02 260 / 0.18), 0 20px 40px -24px oklch(0.2 0.02 260 / 0.22);
  --shadow-lg: 0 2px 4px oklch(0.2 0.02 260 / 0.08), 0 16px 32px -12px oklch(0.2 0.02 260 / 0.22), 0 36px 60px -28px oklch(0.2 0.02 260 / 0.28);
  --inset-sheen: inset 0 1px 0 oklch(1 0 0 / 0.7);
  --tilt-x: 0deg;
  --tilt-y: 0deg;
  --tilt-lift: 0px;
}

/* Feature flags toggleable via .no-fx-* classes on <html> (tweaks panel)  */
html.no-fx-tilt { --tilt-x: 0deg !important; --tilt-y: 0deg !important; }
html.no-fx-depth .card-depth, html.no-fx-depth .depth { box-shadow: var(--shadow-sm) !important; }
html.no-fx-anims *, html.no-fx-anims *::before, html.no-fx-anims *::after {
  animation-duration: 0.001ms !important; animation-iteration-count: 1 !important;
  transition-duration: 0.001ms !important;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
}
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background:
    radial-gradient(ellipse 900px 600px at 85% -10%, oklch(0.95 0.06 55 / 0.55), transparent 60%),
    radial-gradient(ellipse 700px 500px at 0% 100%, oklch(0.94 0.05 280 / 0.4), transparent 55%),
    var(--bg);
  background-attachment: fixed;
  color: var(--ink);
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; color: inherit; }
textarea { resize: none; }

/* Shared */
.app-root { min-height: 100vh; }

/* Landing */
.landing {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 32px 24px 48px;
  max-width: 1100px;
  margin: 0 auto;
}
.landing-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 64px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  letter-spacing: -0.01em;
  font-size: 17px;
}
.brand-mark {
  width: 24px; height: 24px; border-radius: 7px;
  background: var(--grad-accent);
  position: relative;
  box-shadow: 0 4px 14px -4px oklch(0.6 0.18 20 / 0.5), inset 0 1px 0 oklch(1 0 0 / 0.3);
}
.brand-mark::after {
  content: ''; position: absolute; inset: 6px 5px 6px 12px;
  background: oklch(1 0 0 / 0.9); border-radius: 2px;
}
.landing-meta {
  font-size: 13px; color: var(--ink-soft);
}
.landing-hero {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 72px;
  align-items: start;
}
.landing-hero h1 {
  font-size: 64px;
  line-height: 0.98;
  letter-spacing: -0.035em;
  font-weight: 500;
  margin: 0 0 24px;
  text-wrap: balance;
}
.landing-hero h1 em {
  font-style: normal;
  background: var(--grad-accent);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.landing-hero p.lede {
  font-size: 17px;
  line-height: 1.55;
  color: var(--ink-soft);
  max-width: 42ch;
  margin: 0 0 40px;
}
.landing-cards {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.landing-card {
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 22px 24px;
  background: oklch(1 0 0 / 0.75);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  cursor: pointer;
  transition: border-color .2s, transform .2s, box-shadow .2s;
  text-align: left;
  display: flex;
  gap: 18px;
  align-items: center;
  position: relative;
  overflow: hidden;
}
.landing-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--grad-accent);
  opacity: 0;
  transition: opacity .2s;
}
.landing-card:hover {
  border-color: transparent;
  box-shadow: 0 12px 32px -12px oklch(0.4 0.1 280 / 0.25), 0 0 0 1px oklch(0.7 0.1 20 / 0.3);
  transform: translateY(-1px);
}
.landing-card:hover::before { opacity: 1; }
.landing-card .tag {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 4px;
}
.landing-card h3 {
  margin: 0;
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.landing-card p {
  margin: 4px 0 0;
  font-size: 14px;
  color: var(--ink-soft);
}
.landing-card .arrow {
  margin-left: auto;
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-soft);
  transition: background .15s, color .15s, border-color .15s;
  flex-shrink: 0;
}
.landing-card:hover .arrow { background: var(--grad-accent); color: white; border-color: transparent; }

.join-inline {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px dashed var(--line);
  display: flex;
  align-items: center;
  gap: 10px;
}
.join-inline input {
  flex: 1;
  border: 1px solid var(--line);
  background: var(--bg-soft);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 18px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  outline: none;
  font-family: 'JetBrains Mono', monospace;
}
.join-inline input:focus { border-color: var(--ink); background: white; }
.join-inline button {
  padding: 12px 20px;
  background: var(--grad-accent);
  color: white;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 4px 12px -4px oklch(0.6 0.18 20 / 0.45);
  transition: transform .15s, box-shadow .15s;
}
.join-inline button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 18px -6px oklch(0.6 0.18 20 / 0.55); }
.join-inline button:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }

.privacy-note {
  margin-top: 48px;
  padding: 20px 22px;
  border: 1px solid var(--line-soft);
  border-radius: 14px;
  background: linear-gradient(135deg, oklch(0.98 0.015 65 / 0.7), oklch(0.97 0.015 280 / 0.5));
  backdrop-filter: blur(6px);
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink-soft);
  max-width: 640px;
}
.privacy-note strong { color: var(--ink); font-weight: 500; }

/* ===== Student view ===== */
.student {
  min-height: 100vh;
  max-width: 520px;
  margin: 0 auto;
  padding: 20px 18px 120px;
  display: flex;
  flex-direction: column;
}
.student-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line-soft);
}
.student-head .left { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--ink-soft); }
.student-head .code { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.12em; color: var(--ink); font-weight: 500; }

.stepper {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 28px;
}
.stepper-pill {
  padding: 10px 8px 9px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: white;
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--ink-faint);
  text-align: center;
  transition: all .15s;
}
.stepper-pill.active {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.stepper-pill.done {
  border-color: var(--ink);
  color: var(--ink);
  background: white;
}
.stepper-pill .num { display: block; font-size: 10px; margin-bottom: 2px; opacity: 0.7; }

.level-header { margin-bottom: 24px; }
.level-header .eyebrow {
  font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 8px;
}
.level-header h2 {
  font-size: 30px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.08;
  margin: 0 0 10px;
  text-wrap: balance;
}
.level-header p {
  font-size: 15px;
  color: var(--ink-soft);
  margin: 0;
  line-height: 1.5;
}
.level-3 .level-header .eyebrow { color: var(--warm); }
.level-3 .level-header h2 { }

.field { margin-bottom: 28px; }
.field label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 10px;
  color: var(--ink);
}
.field .hint {
  font-size: 12px;
  color: var(--ink-faint);
  margin-top: 6px;
  font-weight: 400;
}
.field .optional { color: var(--ink-faint); font-weight: 400; font-size: 13px; margin-left: 6px; }

input.text, textarea.text {
  width: 100%;
  border: 1px solid var(--line);
  background: white;
  border-radius: 10px;
  padding: 14px 14px;
  font-size: 16px;
  outline: none;
  transition: border-color .15s;
  line-height: 1.5;
}
textarea.text { min-height: 92px; }
input.text:focus, textarea.text:focus { border-color: var(--ink); }

/* Scale 1-5 */
.scale {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}
.scale button {
  aspect-ratio: 1.2;
  border: 1px solid var(--line);
  background: white;
  border-radius: 10px;
  font-size: 20px;
  font-weight: 500;
  color: var(--ink-soft);
  transition: all .12s;
}
.scale button:hover { border-color: var(--ink-soft); }
.scale button.sel {
  background: var(--grad-cool);
  color: white;
  border-color: transparent;
  box-shadow: 0 4px 14px -4px oklch(0.55 0.14 260 / 0.5);
}
.scale-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 11px;
  color: var(--ink-faint);
}

/* Single choice */
.choices { display: flex; flex-direction: column; gap: 8px; }
.choice {
  border: 1px solid var(--line);
  background: white;
  border-radius: 10px;
  padding: 14px 16px;
  text-align: left;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all .12s;
  min-height: 50px;
}
.choice:hover { border-color: var(--ink-soft); }
.choice .dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 1.5px solid var(--line);
  flex-shrink: 0;
  transition: all .12s;
}
.choice.sel { border-color: transparent; background: linear-gradient(135deg, oklch(0.97 0.02 260), oklch(0.96 0.025 280)); box-shadow: 0 0 0 1.5px oklch(0.55 0.14 260 / 0.5); }
.choice.sel .dot { border-color: transparent; background: var(--grad-cool); box-shadow: inset 0 0 0 3px white; }

/* Mood barometer */
.mood {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.mood button {
  aspect-ratio: 1;
  border: 1px solid var(--line);
  background: white;
  border-radius: 14px;
  transition: all .15s;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.mood button svg { width: 60%; height: 60%; }
.mood button:hover { border-color: var(--ink-soft); }
.mood button.sel { border-color: transparent; background: linear-gradient(135deg, oklch(0.97 0.04 55), oklch(0.96 0.05 20)); box-shadow: 0 0 0 2px oklch(0.66 0.17 40 / 0.6), 0 6px 18px -6px oklch(0.66 0.17 40 / 0.4); }
.mood-scale-labels {
  display: flex; justify-content: space-between;
  margin-top: 10px;
  font-size: 11px;
  color: var(--ink-faint);
}

/* Footer nav on student */
.student-nav {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: linear-gradient(to top, var(--bg) 65%, transparent);
  padding: 16px 18px 22px;
  display: flex; gap: 10px;
  justify-content: space-between;
  max-width: 520px;
  margin: 0 auto;
}
.student-nav button {
  flex: 1;
  padding: 15px 18px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
  transition: all .15s;
}
.btn-ghost { border: 1px solid var(--line); background: white; color: var(--ink); }
.btn-ghost:hover { border-color: var(--ink); }
.btn-primary { background: var(--ink); color: var(--bg); box-shadow: 0 4px 14px -4px oklch(0.22 0.01 260 / 0.4); }
.btn-primary:hover { background: oklch(0.15 0.01 260); transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-submit { background: var(--grad-warm); color: white; box-shadow: 0 6px 18px -6px oklch(0.66 0.18 35 / 0.55); }
.btn-submit:hover { transform: translateY(-1px); box-shadow: 0 10px 24px -8px oklch(0.66 0.18 35 / 0.65); }

/* Submitted screen */
.submitted {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
  padding: 40px 24px;
  max-width: 480px;
  margin: 0 auto;
}
.submitted .check {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--grad-warm);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
  color: white;
  box-shadow: 0 14px 34px -10px oklch(0.66 0.18 35 / 0.55);
}
.submitted h2 {
  font-size: 34px; font-weight: 500; letter-spacing: -0.02em;
  margin: 0 0 14px; line-height: 1.1;
}
.submitted p { color: var(--ink-soft); font-size: 16px; line-height: 1.55; margin: 0 0 8px; }

/* ===== Teacher view ===== */
.teacher {
  min-height: 100vh;
  background:
    radial-gradient(ellipse 900px 500px at 90% 0%, oklch(0.35 0.12 25 / 0.25), transparent 60%),
    radial-gradient(ellipse 800px 500px at 0% 100%, oklch(0.35 0.12 280 / 0.3), transparent 55%),
    linear-gradient(180deg, var(--teacher-bg), var(--teacher-bg-2));
  color: var(--teacher-ink);
  padding: 28px 32px 40px;
  display: flex; flex-direction: column;
}
.teacher-head {
  display: flex; align-items: center; gap: 24px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--teacher-line);
  margin-bottom: 28px;
}
.teacher-head .brand { color: var(--teacher-ink); }
.teacher-head .brand-mark { background: var(--grad-accent); }
.teacher-head .brand-mark::after { background: oklch(0.18 0.02 265); }
.teacher-session {
  display: flex; align-items: baseline; gap: 14px; margin-left: 12px;
}
.teacher-session .label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teacher-ink-soft); }
.teacher-session .code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 30px; font-weight: 500;
  letter-spacing: 0.15em;
  background: var(--grad-accent);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.teacher-stats {
  margin-left: auto;
  display: flex; gap: 32px; align-items: center;
}
.teacher-stat .k { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teacher-ink-soft); }
.teacher-stat .v { font-size: 24px; font-weight: 500; letter-spacing: -0.01em; }
.teacher-stat .v small { font-size: 14px; color: var(--teacher-ink-soft); font-weight: 400; margin-left: 4px; }
.teacher-head-btns { display: flex; gap: 8px; }
.t-btn {
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--teacher-line);
  color: var(--teacher-ink);
  background: var(--teacher-panel);
  display: flex; align-items: center; gap: 6px;
  transition: background .15s, border-color .15s;
}
.t-btn:hover { background: oklch(0.32 0.015 260); }
.t-btn.danger:hover { background: oklch(0.35 0.08 25); border-color: oklch(0.55 0.15 25); }
.t-btn.primary { background: var(--teacher-ink); color: var(--teacher-bg); border-color: var(--teacher-ink); }
.t-btn.primary:hover { background: oklch(0.9 0.01 85); }

/* Tile grid */
.tiles {
  display: grid;
  grid-template-columns: 1.15fr 1fr;
  grid-template-rows: auto auto;
  gap: 20px;
  flex: 1;
}
.tile {
  background: linear-gradient(180deg, oklch(0.26 0.025 265 / 0.9), oklch(0.22 0.025 270 / 0.9));
  border: 1px solid var(--teacher-line);
  border-radius: 18px;
  padding: 24px 26px;
  display: flex; flex-direction: column;
  min-height: 0;
  overflow: hidden;
  position: relative;
  box-shadow: 0 1px 0 oklch(1 0 0 / 0.04) inset, 0 20px 40px -20px oklch(0 0 0 / 0.4);
}
.tile::before {
  content: '';
  position: absolute;
  top: 0; left: 24px; right: 24px;
  height: 1px;
  background: linear-gradient(90deg, transparent, oklch(0.7 0.1 40 / 0.5), oklch(0.6 0.1 280 / 0.5), transparent);
}
.tile-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; }
.tile-head .eyebrow {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--teacher-ink-soft);
  margin-bottom: 6px;
}
.tile-head h3 {
  margin: 0; font-size: 20px; font-weight: 500; letter-spacing: -0.01em;
}
.tile-head .tabs { display: flex; gap: 2px; background: oklch(0.2 0.012 260); border-radius: 8px; padding: 3px; }
.tile-head .tabs button {
  font-size: 12px; padding: 6px 10px; border-radius: 6px;
  color: var(--teacher-ink-soft);
}
.tile-head .tabs button.active { background: var(--teacher-panel); color: var(--teacher-ink); }

.tile-body { flex: 1; min-height: 0; display: flex; flex-direction: column; }

.empty {
  color: var(--teacher-ink-soft);
  font-size: 14px;
  text-align: center;
  padding: 40px 20px;
  border: 1px dashed var(--teacher-line);
  border-radius: 12px;
  margin: auto 0;
}

/* Word cloud */
.cloud {
  flex: 1;
  display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
  gap: 4px 14px;
  padding: 8px 0 20px;
  line-height: 1.1;
}
.cloud span {
  display: inline-block;
  color: var(--teacher-ink);
  letter-spacing: -0.01em;
  font-weight: 500;
  transition: color .2s;
}
.cloud span.w1 { color: var(--teacher-ink-soft); font-weight: 400; }
.cloud span.w2 { color: oklch(0.82 0.03 250); }
.cloud span.w3 { color: var(--teacher-ink); }
.cloud span.w4 { color: oklch(0.88 0.08 40); }
.cloud span.w5 { background: var(--grad-accent); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 600; }

.confidence {
  padding-top: 16px;
  border-top: 1px solid var(--teacher-line);
}
.confidence-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.confidence-head .k { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teacher-ink-soft); }
.confidence-head .avg { font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
.confidence-head .avg small { font-size: 13px; color: var(--teacher-ink-soft); margin-left: 4px; font-weight: 400; }
.confidence-bars {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
  align-items: end;
  height: 80px;
}
.confidence-bar {
  background: linear-gradient(180deg, oklch(0.62 0.13 250), oklch(0.48 0.1 270));
  border-radius: 6px 6px 0 0;
  position: relative;
  min-height: 4px;
  transition: height .4s;
  box-shadow: inset 0 1px 0 oklch(1 0 0 / 0.15);
}
.confidence-bar .count {
  position: absolute; top: -18px; left: 0; right: 0; text-align: center;
  font-size: 12px; color: var(--teacher-ink-soft);
}
.confidence-bar .lab {
  position: absolute; bottom: -22px; left: 0; right: 0; text-align: center;
  font-size: 12px; color: var(--teacher-ink-soft);
}
.confidence-wrap { padding-bottom: 24px; }

/* Bar chart */
.bars { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.bar-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; }
.bar-row .lab { font-size: 14px; color: var(--teacher-ink); }
.bar-row .track {
  grid-column: 1 / -1;
  height: 10px; background: oklch(0.22 0.012 260); border-radius: 6px;
  overflow: hidden;
}
.bar-row .fill { height: 100%; background: var(--grad-cool); border-radius: 6px; transition: width .5s; box-shadow: 0 0 12px oklch(0.6 0.14 260 / 0.3); }
.bar-row-inner {
  display: flex; justify-content: space-between; font-size: 13px; color: var(--teacher-ink-soft);
  margin-bottom: 4px;
}
.bar-row-inner .count { font-variant-numeric: tabular-nums; }

.private-section {
  margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--teacher-line);
}
.private-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.private-head .k { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teacher-ink-soft); display: flex; align-items: center; gap: 6px; }
.private-head .lock-badge { padding: 2px 7px; border-radius: 4px; font-size: 10px; background: oklch(0.35 0.06 55 / 0.25); color: oklch(0.85 0.1 55); letter-spacing: 0.05em; }
.private-list { max-height: 130px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding-right: 4px; }
.private-list::-webkit-scrollbar { width: 6px; }
.private-list::-webkit-scrollbar-thumb { background: var(--teacher-line); border-radius: 3px; }
.private-item {
  display: grid; grid-template-columns: 22px 1fr; gap: 10px;
  padding: 8px 10px;
  background: oklch(0.22 0.012 260);
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.45;
  color: var(--teacher-ink);
}
.private-item .num { color: var(--teacher-ink-soft); font-family: 'JetBrains Mono', monospace; font-size: 11px; text-align: right; padding-top: 2px; }
.private-hidden {
  font-size: 13px; color: var(--teacher-ink-soft);
  padding: 28px 12px; text-align: center;
  border: 1px dashed var(--teacher-line); border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.private-hidden button { font-size: 12px; padding: 6px 12px; border-radius: 6px; background: var(--teacher-line); color: var(--teacher-ink); }

/* Mood */
.mood-chart {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
  flex: 1; align-items: end;
  padding: 10px 0 36px;
}
.mood-col {
  position: relative;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  min-height: 60px;
}
.mood-col .svg-wrap { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; }
.mood-col .track {
  width: 100%;
  height: 160px;
  position: relative;
  background: oklch(0.22 0.012 260);
  border-radius: 10px;
  overflow: hidden;
}
.mood-col .fill {
  position: absolute; left: 0; right: 0; bottom: 0;
  border-radius: 10px;
  transition: height .5s;
}
.mood-col .count {
  position: absolute; top: 8px; left: 0; right: 0;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  color: var(--teacher-ink);
}
.mood-col .pct {
  font-size: 11px; color: var(--teacher-ink-soft); font-variant-numeric: tabular-nums;
}

/* Cards */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  overflow-y: auto;
  align-content: start;
  padding-right: 4px;
  flex: 1;
  min-height: 120px;
}
.cards-grid::-webkit-scrollbar { width: 6px; }
.cards-grid::-webkit-scrollbar-thumb { background: var(--teacher-line); border-radius: 3px; }
.q-card {
  border: 1px solid var(--teacher-line);
  background: linear-gradient(160deg, oklch(0.24 0.025 265), oklch(0.2 0.03 280));
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.45;
  color: var(--teacher-ink);
  cursor: pointer;
  transition: all .2s;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 84px;
  overflow: hidden;
}
.q-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--grad-accent);
  opacity: 0.5;
}
.q-card:hover { border-color: oklch(0.5 0.03 280); transform: translateY(-1px); box-shadow: 0 10px 24px -10px oklch(0 0 0 / 0.5); }
.q-card .num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--teacher-ink-soft); letter-spacing: 0.08em; }
.q-card .text { flex: 1; }
.q-card.done { opacity: 0.45; }
.q-card.done .text { text-decoration: line-through; }
.q-card .pickedup {
  position: absolute; top: 8px; right: 8px;
  font-size: 10px; color: var(--warm);
  background: oklch(0.35 0.08 55 / 0.25);
  padding: 2px 6px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.08em;
}

/* QR overlay */
.qr-corner {
  position: absolute;
  right: 28px; bottom: 24px;
  background: var(--teacher-panel);
  border: 1px solid var(--teacher-line);
  border-radius: 12px;
  padding: 14px 14px 12px;
  display: flex; flex-direction: column; align-items: center;
  gap: 8px;
  z-index: 10;
}
.qr-corner .qr-box {
  width: 88px; height: 88px;
  background: white;
  border-radius: 6px;
  padding: 6px;
}
.qr-corner .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teacher-ink-soft); }
.qr-corner .code { font-family: 'JetBrains Mono', monospace; font-size: 15px; letter-spacing: 0.15em; color: var(--teacher-ink); font-weight: 500; }

/* Session create */
.create {
  min-height: 100vh;
  padding: 40px 32px;
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
}
.create-content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  margin-top: 40px;
  align-items: start;
}
.create-left h1 { font-size: 52px; letter-spacing: -0.03em; font-weight: 500; line-height: 1; margin: 0 0 20px; }
.create-left p { font-size: 16px; color: var(--ink-soft); line-height: 1.55; margin: 0 0 24px; max-width: 42ch; }
.create-code-row { display: flex; align-items: center; gap: 20px; padding: 20px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); margin-bottom: 24px; }
.create-code-row .k { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-faint); margin-bottom: 8px; }
.create-code-row .code { font-family: 'JetBrains Mono', monospace; font-size: 64px; letter-spacing: 0.12em; font-weight: 500; line-height: 1; background: var(--grad-accent); -webkit-background-clip: text; background-clip: text; color: transparent; }
.create-right {
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 28px;
  background: oklch(1 0 0 / 0.75);
  backdrop-filter: blur(10px);
  display: flex; flex-direction: column; align-items: center;
  box-shadow: 0 20px 50px -20px oklch(0.4 0.1 280 / 0.25);
  position: relative;
  overflow: hidden;
}
.create-right::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--grad-accent);
}
.create-right .qr-large {
  width: 240px; height: 240px;
  background: white;
  border-radius: 8px;
}
.create-right .url { margin-top: 18px; font-size: 13px; color: var(--ink-soft); font-family: 'JetBrains Mono', monospace; word-break: break-all; text-align: center; }
.create-actions { display: flex; gap: 12px; margin-top: 32px; }
.create-actions button {
  padding: 14px 22px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
}
.create-actions .primary { background: var(--grad-accent); color: white; box-shadow: 0 6px 18px -6px oklch(0.6 0.18 20 / 0.5); transition: transform .15s, box-shadow .15s; }
.create-actions .primary:hover { transform: translateY(-1px); box-shadow: 0 10px 24px -8px oklch(0.6 0.18 20 / 0.6); }
.create-actions .secondary { border: 1px solid var(--line); color: var(--ink); background: white; }
.create-actions .secondary:hover { border-color: var(--ink); }

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0;
  background: oklch(0.15 0.01 260 / 0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 24px;
}
.modal {
  background: white;
  color: var(--ink);
  border-radius: 16px;
  padding: 28px 28px 22px;
  max-width: 440px; width: 100%;
}
.modal h3 { margin: 0 0 12px; font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
.modal p { margin: 0 0 20px; font-size: 14px; color: var(--ink-soft); line-height: 1.55; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
.modal-actions button { padding: 11px 18px; border-radius: 10px; font-size: 14px; font-weight: 500; }
.modal-actions .danger { background: oklch(0.55 0.18 25); color: white; }
.modal-actions .danger:hover { background: oklch(0.5 0.18 25); }
.modal-actions .ghost { border: 1px solid var(--line); color: var(--ink); }

.question-focus {
  background: white; color: var(--ink);
  border-radius: 16px;
  padding: 40px 36px 28px;
  max-width: 680px; width: 100%;
  display: flex; flex-direction: column;
  gap: 24px;
}
.question-focus .num { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--ink-faint); letter-spacing: 0.1em; }
.question-focus .text { font-size: 32px; line-height: 1.15; letter-spacing: -0.015em; font-weight: 500; text-wrap: balance; }
.question-focus .focus-actions { display: flex; gap: 10px; justify-content: space-between; align-items: center; margin-top: 8px; }
.question-focus .focus-actions .right { display: flex; gap: 10px; }
.question-focus .focus-actions button { padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; }
.focus-mark-done { background: var(--ink); color: var(--bg); }
.focus-mark-undo { border: 1px solid var(--line); color: var(--ink); }
.focus-nav { border: 1px solid var(--line); color: var(--ink-soft); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.focus-nav:hover { color: var(--ink); border-color: var(--ink); }

/* Projection mode */
.projection .tile { padding: 36px 40px; border-radius: 20px; }
.projection .tile-head h3 { font-size: 30px; }
.projection .tile-head .eyebrow { font-size: 14px; }
.projection .cloud span { font-weight: 600; }
.projection .confidence-head .avg { font-size: 36px; }
.projection .confidence-bars { height: 140px; }
.projection .mood-col .track { height: 260px; }
.projection .mood-col .count { font-size: 24px; }
.projection .bar-row .lab { font-size: 18px; }
.projection .q-card { font-size: 18px; line-height: 1.3; padding: 18px 20px; min-height: 110px; }
.projection .teacher-session .code { font-size: 44px; }

/* Small screens */
@media (max-width: 900px) {
  .landing-hero { grid-template-columns: 1fr; gap: 40px; }
  .landing-hero h1 { font-size: 46px; }
  .create-content { grid-template-columns: 1fr; gap: 40px; }
  .create-left h1 { font-size: 40px; }
  .create-code-row .code { font-size: 48px; }
  .tiles { grid-template-columns: 1fr; }
  .teacher { padding: 20px 18px; }
  .teacher-head { flex-wrap: wrap; gap: 14px; }
  .teacher-stats { width: 100%; order: 3; margin-left: 0; justify-content: space-between; }
  .qr-corner { display: none; }
  .mt-cols { grid-template-columns: 1fr !important; }
  .stw-grid { grid-template-columns: 1fr !important; }
  .exam-grid { grid-template-columns: 1fr !important; }
}

/* ===================== Method-shared ===================== */
.m-student {
  min-height: 100vh; max-width: 560px; margin: 0 auto;
  padding: 20px 18px 130px; display: flex; flex-direction: column;
}
.ms-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 22px; padding-bottom: 14px;
  border-bottom: 1px solid var(--line-soft);
}
.ms-head .code { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.12em; font-weight: 500; }
.ms-intro { margin-bottom: 22px; }
.ms-intro .eyebrow {
  font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-faint); margin-bottom: 8px;
}
.ms-intro .eyebrow.creative { color: oklch(0.6 0.12 65); }
.ms-intro .eyebrow.perf { color: oklch(0.5 0.05 260); }
.ms-intro h2 {
  font-size: 28px; font-weight: 500; letter-spacing: -0.02em;
  line-height: 1.1; margin: 0 0 10px; text-wrap: balance;
}
.ms-intro p { font-size: 15px; color: var(--ink-soft); margin: 0; line-height: 1.5; }
.ms-nav {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: linear-gradient(to top, var(--bg) 65%, transparent);
  padding: 16px 18px 22px; display: flex; gap: 10px;
  max-width: 560px; margin: 0 auto;
}
.ms-nav button {
  flex: 1; padding: 15px 18px; border-radius: 12px;
  font-size: 15px; font-weight: 500; transition: all .15s;
}
.m-err {
  background: oklch(0.95 0.05 25); color: oklch(0.4 0.15 25);
  padding: 12px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px;
}
.m-empty, .m-loading {
  color: var(--teacher-ink-soft); font-size: 15px;
  text-align: center; padding: 60px 20px;
  border: 1px dashed var(--teacher-line); border-radius: 12px;
  margin: 24px auto; max-width: 480px;
}
.m-loading { color: var(--ink-soft); border-color: var(--line); }

.m-teacher { width: 100%; }
.mt-cols { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; }
.mt-main { display: flex; flex-direction: column; gap: 18px; }
.mt-side {
  background: linear-gradient(180deg, oklch(0.26 0.025 265 / 0.9), oklch(0.22 0.025 270 / 0.9));
  border: 1px solid var(--teacher-line); border-radius: 18px;
  padding: 22px 22px 18px; display: flex; flex-direction: column; gap: 12px;
  min-height: 400px;
}
.mt-side-head { font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teacher-ink-soft); display: flex; justify-content: space-between; align-items: center; }
.mt-side-body { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; max-height: 500px; padding-right: 6px; }
.mt-side-body::-webkit-scrollbar { width: 6px; } .mt-side-body::-webkit-scrollbar-thumb { background: var(--teacher-line); border-radius: 3px; }
.mt-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--teacher-ink-soft); margin-bottom: 6px; }
.hint-box {
  font-size: 12px; color: var(--teacher-ink-soft);
  padding: 10px 14px; border-radius: 8px;
  background: oklch(0.22 0.012 260); margin-top: 16px;
  border-left: 2px solid oklch(0.5 0.08 60);
}
.link-btn { color: var(--teacher-ink-soft); text-decoration: underline; background: none; font-size: 12px; padding: 4px 8px; }
.link-btn:hover { color: var(--teacher-ink); }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  padding: 10px 14px; border-radius: 999px; border: 1px solid var(--line);
  background: white; font-size: 13px; color: var(--ink-soft); transition: all .12s;
}
.chip:hover { border-color: var(--ink-soft); }
.chip.sel { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.teacher-body { flex: 1; min-height: 0; }

/* Group picker */
.group-picker {
  min-height: 100vh; max-width: 1100px; margin: 0 auto;
  padding: 48px 32px 60px; display: flex; flex-direction: column;
}
.gp-head { margin-bottom: 36px; }
.gp-head h2 { font-size: 42px; font-weight: 500; letter-spacing: -0.025em; margin: 14px 0 10px; }
.gp-sub { color: var(--ink-soft); font-size: 16px; line-height: 1.5; max-width: 56ch; margin: 0; }
.gp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.gp-grid.gp-2 { grid-template-columns: repeat(2, 1fr); }
.gp-card {
  text-align: left; border: 1px solid var(--line); border-radius: 18px;
  padding: 28px 26px 26px; background: oklch(1 0 0 / 0.75); backdrop-filter: blur(8px);
  cursor: pointer; transition: all .2s; display: flex; flex-direction: column; gap: 12px;
}
.gp-card h3 { margin: 0; font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
.gp-card p { margin: 0; font-size: 14px; line-height: 1.5; color: var(--ink-soft); }
.gp-card:hover { transform: translateY(-3px); box-shadow: 0 22px 40px -20px oklch(0.4 0.08 260 / 0.3); border-color: transparent; }
.gp-icon {
  width: 56px; height: 56px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  color: white;
}
.gp-blue .gp-icon { background: linear-gradient(135deg, oklch(0.62 0.14 250), oklch(0.52 0.16 275)); }
.gp-ocker .gp-icon { background: linear-gradient(135deg, oklch(0.72 0.15 55), oklch(0.64 0.18 30)); }
.gp-grey .gp-icon { background: linear-gradient(135deg, oklch(0.58 0.03 260), oklch(0.42 0.025 265)); }

.method-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.method-card {
  text-align: left; border: 1px solid var(--line); border-radius: 16px;
  padding: 24px 22px; background: oklch(1 0 0 / 0.75); cursor: pointer;
  display: flex; flex-direction: column; gap: 8px; transition: all .2s;
}
.method-card:hover { transform: translateY(-2px); box-shadow: 0 18px 36px -18px oklch(0.4 0.08 260 / 0.3); }
.method-emoji { font-size: 34px; line-height: 1; }
.method-card h3 { margin: 6px 0 0; font-size: 18px; font-weight: 500; }
.method-desc { font-size: 13px; color: var(--ink-soft); margin: 0; line-height: 1.45; }
.method-hint { font-size: 12px; color: var(--ink-faint); margin: 4px 0 0; line-height: 1.4; font-style: italic; }

/* Dice stage */
.dice-stage { display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 40px 0; }
.dice-card {
  width: 100%; max-width: 460px; padding: 40px 36px 34px;
  border-radius: 22px; background: linear-gradient(160deg, oklch(0.98 0.02 55), oklch(0.96 0.04 40));
  border: 1px solid var(--line); display: flex; flex-direction: column; gap: 10px; align-items: center;
  text-align: center; transition: transform .15s;
}
.dice-card.rolling { animation: dice-jitter 0.1s infinite alternate; }
.dice-card.landed { animation: dice-pop 0.4s ease; }
.dice-emoji { font-size: 72px; line-height: 1; }
.dice-card h3 { margin: 6px 0 0; font-size: 26px; font-weight: 500; letter-spacing: -0.01em; }
.dice-card p { margin: 4px 0 0; color: var(--ink-soft); font-size: 15px; max-width: 42ch; }
@keyframes dice-jitter { from { transform: rotate(-2deg) translateY(0); } to { transform: rotate(2deg) translateY(-4px); } }
@keyframes dice-pop { 0% { transform: scale(0.9); } 50% { transform: scale(1.04); } 100% { transform: scale(1); } }
.dice-actions { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.btn-big { padding: 16px 28px; font-size: 16px; border-radius: 14px; }

/* Create session: chosen method pill + grading toggle */
.chosen-method-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 14px; border-radius: 999px;
  background: oklch(0.96 0.03 60); border: 1px solid oklch(0.9 0.04 60);
  font-size: 13px; color: oklch(0.35 0.06 40); font-weight: 500;
  margin-bottom: 18px;
}
.grading-toggle {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 0; margin: -12px 0 14px;
}
.grading-toggle .k {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--ink-faint); margin-right: 8px;
}
.grading-toggle button {
  padding: 8px 14px; border-radius: 8px; border: 1px solid var(--line);
  background: white; font-size: 13px; color: var(--ink-soft);
}
.grading-toggle button.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }

.classsize-in { display: flex; flex-direction: column; gap: 4px; }
.classsize-in span { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teacher-ink-soft); }
.classsize-in input {
  width: 70px; padding: 6px 10px; border-radius: 8px;
  background: var(--teacher-panel); border: 1px solid var(--teacher-line);
  color: var(--teacher-ink); font-size: 14px; outline: none;
}

/* ===================== Weather ===================== */
.weather-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px;
}
.weather-tile {
  aspect-ratio: 1; border: 1px solid var(--line); border-radius: 16px;
  background: white; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; padding: 8px; transition: all .15s;
}
.weather-tile:hover { border-color: var(--ink-soft); }
.weather-tile.sel {
  border-color: transparent;
  background: linear-gradient(135deg, oklch(0.97 0.04 55), oklch(0.96 0.05 70));
  box-shadow: 0 0 0 2px oklch(0.66 0.17 45 / 0.6);
}
.wemoji { font-size: 32px; line-height: 1; }
.wlabel { font-size: 11px; color: var(--ink-soft); text-align: center; line-height: 1.2; }
.temp-row { display: flex; align-items: center; gap: 12px; }
.temp-end { font-size: 11px; color: var(--ink-faint); letter-spacing: 0.05em; text-transform: uppercase; }
.temp-slider { flex: 1; accent-color: oklch(0.66 0.17 45); height: 4px; }
.temp-read { text-align: center; font-size: 28px; font-weight: 500; margin-top: 6px; background: var(--grad-warm); -webkit-background-clip: text; background-clip: text; color: transparent; }

.weather-hero { display: flex; gap: 20px; align-items: center; padding: 22px 24px; border-radius: 16px; background: linear-gradient(135deg, oklch(0.28 0.05 55 / 0.6), oklch(0.25 0.04 30 / 0.6)); }
.weather-hero-emoji { font-size: 88px; line-height: 1; }
.weather-hero-lab .label { font-size: 28px; font-weight: 500; color: var(--teacher-ink); }
.weather-hero-lab .sub { font-size: 13px; color: var(--teacher-ink-soft); margin-top: 2px; }
.weather-overview { display: flex; flex-direction: column; gap: 8px; padding: 18px 0; }
.weather-bar { display: grid; grid-template-columns: 40px 1fr 30px; align-items: center; gap: 10px; }
.weather-bar.dim { opacity: 0.35; }
.wb-emoji { font-size: 24px; text-align: center; }
.wb-bar { height: 10px; background: oklch(0.22 0.012 260); border-radius: 6px; overflow: hidden; }
.wb-fill { height: 100%; background: linear-gradient(90deg, oklch(0.68 0.16 55), oklch(0.62 0.14 30)); transition: width .5s; }
.wb-count { font-size: 13px; font-variant-numeric: tabular-nums; color: var(--teacher-ink-soft); }
.temp-gauge { padding: 14px 18px; border-radius: 12px; background: oklch(0.22 0.012 260); }
.tg-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.tg-head .k { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teacher-ink-soft); }
.tg-head .v { font-size: 24px; font-weight: 500; background: var(--grad-warm); -webkit-background-clip: text; background-clip: text; color: transparent; }
.tg-track { height: 8px; border-radius: 4px; background: linear-gradient(90deg, oklch(0.5 0.14 250), oklch(0.7 0.04 100) 45%, oklch(0.68 0.18 35)); position: relative; }
.tg-ptr { position: absolute; top: -4px; width: 3px; height: 16px; background: white; border-radius: 2px; transform: translateX(-50%); box-shadow: 0 0 10px oklch(1 0 0 / 0.6); }
.tg-lab { position: absolute; top: 14px; font-size: 10px; color: var(--teacher-ink-soft); text-transform: uppercase; letter-spacing: 0.1em; }
.tg-lab.left { left: 0; } .tg-lab.right { right: 0; }
.ws-group { border-top: 1px solid var(--teacher-line); padding-top: 10px; }
.ws-group:first-child { border-top: none; padding-top: 0; }
.ws-group-head { font-size: 12px; color: var(--teacher-ink-soft); margin-bottom: 6px; }
.ws-group-head .e { font-size: 16px; margin-right: 4px; }
.ws-item { padding: 8px 10px; background: oklch(0.22 0.012 260); border-radius: 8px; font-size: 13px; color: var(--teacher-ink); line-height: 1.4; margin-bottom: 4px; }
.ws-empty { font-size: 13px; color: var(--teacher-ink-soft); padding: 20px; text-align: center; }

/* ===================== Suitcase ===================== */
.stw-boxes { display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; }
.stw-box {
  padding: 20px 20px 18px; border-radius: 16px; border: 1px solid var(--line);
  background: white; display: flex; flex-direction: column; gap: 8px;
  position: relative;
}
.stw-box.stw-a { background: linear-gradient(135deg, oklch(0.98 0.02 150 / 0.9), white); border-color: oklch(0.88 0.04 150); }
.stw-box.stw-b { background: linear-gradient(135deg, oklch(0.97 0.025 30 / 0.9), white); border-color: oklch(0.88 0.05 30); }
.stw-box.stw-c { background: linear-gradient(135deg, oklch(0.97 0.025 240 / 0.9), white); border-color: oklch(0.88 0.04 240); }
.stw-icon { font-size: 36px; line-height: 1; }
.stw-title { font-size: 18px; font-weight: 500; letter-spacing: -0.01em; }
.stw-prompt { font-size: 13px; color: var(--ink-soft); margin-bottom: 4px; line-height: 1.4; }
.stw-box textarea { background: white; }

.stw-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.stw-col {
  background: linear-gradient(180deg, oklch(0.26 0.025 265 / 0.9), oklch(0.22 0.025 270 / 0.9));
  border: 1px solid var(--teacher-line); border-radius: 18px; padding: 20px;
  display: flex; flex-direction: column; gap: 14px; min-height: 400px;
}
.stw-col.stw-a { border-top: 3px solid oklch(0.6 0.14 150); }
.stw-col.stw-b { border-top: 3px solid oklch(0.62 0.16 30); }
.stw-col.stw-c { border-top: 3px solid oklch(0.58 0.13 240); }
.stw-col-head { display: flex; align-items: center; gap: 12px; }
.stw-col-head .emoji { font-size: 28px; }
.stw-col-head .title { font-size: 18px; font-weight: 500; color: var(--teacher-ink); }
.stw-col-head .sub { font-size: 12px; color: var(--teacher-ink-soft); }
.stw-cards { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 520px; padding-right: 4px; }
.stw-card { padding: 12px 14px; border-radius: 10px; background: oklch(0.22 0.012 260); border: 1px solid var(--teacher-line); font-size: 13px; line-height: 1.45; color: var(--teacher-ink); cursor: pointer; transition: all .15s; position: relative; }
.stw-card:hover { border-color: oklch(0.5 0.03 280); }
.stw-card.picked { opacity: 0.5; }
.stw-card.picked .stw-card-text { text-decoration: line-through; }
.stw-card-tag { position: absolute; top: 6px; right: 8px; font-size: 9px; color: var(--warm); background: oklch(0.35 0.08 55 / 0.25); padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
.stw-empty { color: var(--teacher-ink-soft); font-size: 13px; text-align: center; padding: 20px; }

/* ===================== Country ===================== */
.country-search { margin-bottom: 14px; }
.country-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
.country-tile {
  aspect-ratio: 1; border: 1px solid var(--line); border-radius: 12px;
  background: white; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; padding: 6px; transition: all .12s;
}
.country-tile:hover { border-color: var(--ink-soft); }
.country-tile.sel { border-color: transparent; background: linear-gradient(135deg, oklch(0.97 0.03 45), oklch(0.96 0.04 20)); box-shadow: 0 0 0 2px oklch(0.66 0.17 45 / 0.55); }
.cf { font-size: 28px; line-height: 1; }
.cn { font-size: 10px; color: var(--ink-soft); text-align: center; line-height: 1.1; }
.chosen-country { display: flex; align-items: center; gap: 18px; padding: 16px 20px; border-radius: 14px; background: linear-gradient(135deg, oklch(0.97 0.025 45), oklch(0.95 0.04 20)); margin-bottom: 16px; }
.cf-big { font-size: 48px; line-height: 1; }
.cn-big { font-size: 22px; font-weight: 500; }

.country-map { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; padding: 8px 0; }
.ct-tile { position: relative; aspect-ratio: 1; border-radius: 10px; border: 1px solid var(--teacher-line); background: oklch(0.22 0.012 260); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 4px; transition: all .15s; color: var(--teacher-ink); }
.ct-tile.off { opacity: 0.22; }
.ct-tile.on { background: linear-gradient(135deg, oklch(0.32 0.08 55 / 0.6), oklch(0.28 0.06 30 / 0.6)); border-color: oklch(0.55 0.12 45); }
.ct-tile.on.active { border-color: oklch(0.72 0.16 45); box-shadow: 0 0 0 2px oklch(0.66 0.18 45 / 0.5); }
.ct-tile .cf { font-size: 22px; }
.ct-tile .cn { font-size: 9px; color: var(--teacher-ink-soft); }
.ct-tile .badge { position: absolute; top: 2px; right: 3px; font-size: 10px; background: oklch(0.66 0.17 45); color: white; padding: 1px 5px; border-radius: 6px; font-weight: 500; }
.country-rat { padding: 10px 12px; background: oklch(0.22 0.012 260); border-radius: 10px; border: 1px solid var(--teacher-line); font-size: 13px; line-height: 1.45; color: var(--teacher-ink); }
.cr-head { font-size: 12px; color: var(--teacher-ink-soft); margin-bottom: 4px; }
.cr-head .cf { font-size: 16px; margin-right: 4px; }
.cr-why { }
.cr-detail { margin-top: 4px; font-size: 12px; color: var(--teacher-ink-soft); }

/* ===================== Exam ===================== */
.exam-progress { display: flex; gap: 4px; margin-bottom: 22px; }
.ep-step { flex: 1; height: 3px; border-radius: 2px; background: var(--line); transition: background .2s; }
.ep-step.on { background: var(--ink); }
.diff-box { padding: 14px 18px; border-radius: 12px; background: linear-gradient(135deg, oklch(0.97 0.025 260), oklch(0.96 0.03 280)); font-size: 14px; font-weight: 500; text-align: center; }

.exam-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.exam-tile { background: linear-gradient(180deg, oklch(0.26 0.025 265 / 0.9), oklch(0.22 0.025 270 / 0.9)); border: 1px solid var(--teacher-line); border-radius: 16px; padding: 22px 24px; display: flex; flex-direction: column; gap: 12px; }
.exam-tile.private { border-left: 3px solid oklch(0.55 0.12 55); }
.et-head { font-size: 14px; font-weight: 500; color: var(--teacher-ink); display: flex; align-items: center; gap: 8px; }
.et-head .pill { font-size: 10px; background: oklch(0.35 0.06 55 / 0.25); color: oklch(0.85 0.1 55); padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
.et-sub { font-size: 12px; color: var(--teacher-ink-soft); }
.ev-bars { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.evb { padding: 14px; border-radius: 10px; background: oklch(0.22 0.012 260); }
.evb-lab { font-size: 11px; color: var(--teacher-ink-soft); text-transform: uppercase; letter-spacing: 0.1em; }
.evb-v { font-size: 32px; font-weight: 500; letter-spacing: -0.02em; color: var(--teacher-ink); margin-top: 4px; }
.ev-interp { font-size: 13px; color: var(--teacher-ink-soft); font-style: italic; }
.et-bars { display: flex; flex-direction: column; gap: 6px; }
.et-bar { display: grid; grid-template-columns: 140px 1fr 26px; gap: 10px; align-items: center; font-size: 12px; color: var(--teacher-ink); }
.et-bar.hi .etb-lab { color: oklch(0.8 0.12 45); font-weight: 500; }
.etb-lab { font-size: 12px; }
.etb-track { height: 8px; background: oklch(0.22 0.012 260); border-radius: 4px; overflow: hidden; }
.etb-fill { height: 100%; background: var(--grad-cool); transition: width .4s; }
.et-bar.hi .etb-fill { background: linear-gradient(90deg, oklch(0.62 0.14 30), oklch(0.7 0.16 55)); }
.etb-n { font-size: 12px; color: var(--teacher-ink-soft); font-variant-numeric: tabular-nums; }
.support-list { display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; padding-right: 4px; }
.support-item { display: grid; grid-template-columns: 22px 1fr; gap: 10px; padding: 8px 10px; background: oklch(0.22 0.012 260); border-radius: 8px; font-size: 13px; line-height: 1.45; color: var(--teacher-ink); }
.support-item .num { color: var(--teacher-ink-soft); font-family: 'JetBrains Mono', monospace; font-size: 11px; text-align: right; padding-top: 2px; }
.support-empty { font-size: 13px; color: var(--teacher-ink-soft); padding: 18px; text-align: center; }



/* ===================== PHASE A3: Räumliche Tiefe ===================== */
/* Base interactive cards: landing-card, gp-card, method-card, dice-card, mod panels */
.landing-card, .gp-card, .method-card, .dice-card {
  transform: translateZ(0);
  transition:
    transform var(--dur-sm) var(--ease-out),
    box-shadow var(--dur-sm) var(--ease-out),
    border-color var(--dur-sm) var(--ease-out);
  will-change: transform;
  box-shadow: var(--shadow-sm), var(--inset-sheen);
}
.landing-card:hover, .gp-card:hover, .method-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg), var(--inset-sheen);
}
.landing-card:active, .gp-card:active, .method-card:active {
  transform: translateY(-1px) scale(0.995);
  transition-duration: var(--dur-xs);
}

/* Perspective wrapper for tilt-capable cards */
.tilt-wrap { perspective: 1000px; }
.tilt {
  transition: transform var(--dur-sm) var(--ease-out);
  transform: perspective(1000px) rotateX(var(--tilt-x, 0deg)) rotateY(var(--tilt-y, 0deg)) translateY(var(--tilt-lift, 0px));
  transform-style: preserve-3d;
}

/* Buttons — glow on hover */
.primary, .cta, .join-btn, .pill-btn, .m-submit, .ms-nav button,
.focus-mark-done, .focus-mark-undo, .focus-nav {
  transition: box-shadow var(--dur-sm) var(--ease-out), transform var(--dur-xs) var(--ease-out), background var(--dur-sm) var(--ease-out);
}
.primary:hover, .cta:hover, .m-submit:hover {
  box-shadow: 0 8px 22px -8px oklch(0.5 0.15 30 / 0.45), 0 2px 6px oklch(0.5 0.15 30 / 0.22);
}
.primary:active, .cta:active, .m-submit:active { transform: scale(0.98); }

/* Input focus pulse */
input:focus, textarea:focus, select:focus {
  outline: none;
  animation: focus-pulse 640ms var(--ease-out);
}
@keyframes focus-pulse {
  0%   { box-shadow: 0 0 0 0 oklch(0.6 0.14 245 / 0.5); }
  50%  { box-shadow: 0 0 0 6px oklch(0.6 0.14 245 / 0.18); }
  100% { box-shadow: 0 0 0 3px oklch(0.6 0.14 245 / 0.25); }
}

/* ===================== PHASE B: Original logo + intro + mirror ===================== */

/* ─── Pearl (brand mark) ─── */
.pearl-wrap {
  display: inline-block;
  line-height: 0;
  vertical-align: middle;
  filter: drop-shadow(0 4px 10px oklch(0.35 0.12 20 / 0.25));
}
.pearl-wrap svg { display: block; }
.pearl-wrap.is-floating svg {
  /* No CPU float — the cursor-tracked light is the live element now. */
}
.pearl-wrap.is-paused svg { animation-play-state: paused; }
@keyframes pearl-float {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-3px); }
}

/* Wordmark */
.logo-wordmark {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-weight: 700;
  letter-spacing: -0.025em;
  color: var(--ink);
  white-space: nowrap;
  line-height: 1;
}

/* Composite */
.brand-logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  line-height: 1;
}
.brand-logo-xl { gap: 18px; }
.brand-logo-header { gap: 12px; }

/* ─── Intro choreography ───
   The pearl never "pops in" — it's revealed by a black curtain that lifts away.
   Once revealed, the wordmark types itself out, holds, then everything fades. */

/* Full-screen black curtain that hides everything until the pearl is "discovered". */
.intro-curtain {
  position: fixed;
  inset: 0;
  z-index: 79;
  background: #000;
  pointer-events: none;
  opacity: 1;
  /* Curtain fades from full opaque to transparent over the first beat,
     revealing the pearl which was always there, behind it. */
  animation: intro-curtain-fade 1100ms cubic-bezier(0.4, 0, 0.2, 1) 200ms both;
}
@keyframes intro-curtain-fade {
  0%   { opacity: 1; }
  100% { opacity: 0; }
}

.intro-logo {
  position: fixed;
  z-index: 80;
  display: inline-flex;
  align-items: center;
  gap: 18px;
  pointer-events: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 1;
}

/* The pearl itself never animates in — it's static and always at full opacity.
   What animates is the BLACK CURTAIN above it (and a soft inner glow). */
.intro-logo .intro-pearl-glow {
  position: absolute;
  inset: -40% -40% -40% -40%;
  border-radius: 50%;
  background: radial-gradient(closest-side,
    rgba(255, 138, 92, 0.35) 0%,
    rgba(255, 138, 92, 0.10) 40%,
    rgba(255, 138, 92, 0)    70%
  );
  pointer-events: none;
  opacity: 0;
  animation: intro-glow 1800ms cubic-bezier(0.4, 0, 0.2, 1) 1100ms both;
  filter: blur(8px);
  z-index: -1;
}
@keyframes intro-glow {
  0%   { opacity: 0; transform: scale(0.6); }
  40%  { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.2); }
}

/* Wordmark reveal — letters wipe in from a clip mask, no bounce */
.intro-logo .intro-wordmark {
  display: inline-block;
  overflow: hidden;
  white-space: nowrap;
}
.intro-logo .intro-wordmark .intro-letter {
  display: inline-block;
  opacity: 0;
  transform: translateY(0.4em);
  animation: intro-letter 700ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
}
/* Letters start AFTER the curtain has cleared */
.intro-logo .intro-wordmark .intro-letter:nth-child(1) { animation-delay: 1300ms; }
.intro-logo .intro-wordmark .intro-letter:nth-child(2) { animation-delay: 1370ms; }
.intro-logo .intro-wordmark .intro-letter:nth-child(3) { animation-delay: 1440ms; }
.intro-logo .intro-wordmark .intro-letter:nth-child(4) { animation-delay: 1510ms; }
.intro-logo .intro-wordmark .intro-letter:nth-child(5) { animation-delay: 1580ms; }
.intro-logo .intro-wordmark .intro-letter:nth-child(6) { animation-delay: 1650ms; }
.intro-logo .intro-wordmark .intro-letter:nth-child(7) { animation-delay: 1720ms; }
.intro-logo .intro-wordmark .intro-letter:nth-child(8) { animation-delay: 1790ms; }
.intro-logo .intro-wordmark .intro-letter:nth-child(9) { animation-delay: 1860ms; }
@keyframes intro-letter {
  to { opacity: 1; transform: translateY(0); }
}

/* Phase 2 — whole intro composite gracefully exits.
   Pearl + wordmark fade together, no scale jolt. */
.intro-logo.intro-phase-2 {
  opacity: 0;
  transition: opacity 800ms cubic-bezier(0.4, 0, 0.2, 1);
}
.intro-curtain.intro-phase-2 {
  /* Already at opacity 0 — keep it there */
  display: none;
}
.intro-logo.intro-phase-3 {
  opacity: 0;
  pointer-events: none;
  display: none;
}

/* ─── Stage centerpiece (hero pearl) ─── */
.mirror-symbol {
  display: inline-block;
  animation: mirror-in 700ms var(--ease-out) both;
  animation-delay: 3500ms; /* after intro fully clears */
}
@keyframes mirror-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* When user returns and intro is skipped, the pearl appears immediately */
.mirror-symbol.no-intro {
  animation-delay: 0ms;
}

/* ===================== PHASE C1: Page transitions (method steps) ===================== */
.step-enter { animation: step-in var(--dur-md) var(--ease-out) both; }
@keyframes step-in {
  from { opacity: 0; transform: translateX(14px); }
  to   { opacity: 1; transform: translateX(0); }
}
.step-enter-back { animation: step-in-back var(--dur-md) var(--ease-out) both; }
@keyframes step-in-back {
  from { opacity: 0; transform: translateX(-14px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* Staggered reveal for tile grids */
.stagger > * {
  animation: tile-in var(--dur-md) var(--ease-out) both;
}
.stagger > *:nth-child(1) { animation-delay: 0ms; }
.stagger > *:nth-child(2) { animation-delay: 80ms; }
.stagger > *:nth-child(3) { animation-delay: 160ms; }
.stagger > *:nth-child(4) { animation-delay: 240ms; }
.stagger > *:nth-child(5) { animation-delay: 320ms; }
.stagger > *:nth-child(6) { animation-delay: 400ms; }
.stagger > *:nth-child(7) { animation-delay: 480ms; }
.stagger > *:nth-child(n+8) { animation-delay: 560ms; }
@keyframes tile-in {
  from { opacity: 0; transform: translateY(12px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ===================== PHASE C2: Feedback animations ===================== */
.submitted .check {

  100% { transform: scale(1) rotate(0); opacity: 1; }
}
.submitted .check::after {
  content: ''; position: absolute; inset: -6px; border-radius: 50%;
  border: 2px solid oklch(0.7 0.16 35 / 0.45);

}
@keyframes check-ring {
  from { transform: scale(0.6); opacity: 0.9; }
  to   { transform: scale(1.5); opacity: 0; }

  to   { opacity: 1; transform: scale(1); }

.spinner {
  width: 22px; height: 22px;

  border-top-color: oklch(0.5 0.14 245);

}

.country-tile:hover { transform: perspective(600px) rotateX(4deg) rotateY(-4deg) translateY(-2px); box-shadow: var(--shadow-md); }

}
@keyframes chosen-glow {
  0%,100% { box-shadow: var(--shadow-md), 0 0 0 0 oklch(0.6 0.14 245 / 0.5); }
  50%     { box-shadow: var(--shadow-md), 0 0 0 8px oklch(0.6 0.14 245 / 0); }
}

}
.scale button:hover, .mood button:hover { transform: translateY(-1px); }
.scale button:active, .mood button:active { transform: scale(0.96); }
.scale button.on, .mood button.on {
  animation: snap-in var(--dur-sm) var(--ease-spring);
}
@keyframes snap-in {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* Image cards (suitcase/trash/washing) — chosen glow */
.stw-box { transition: transform var(--dur-sm) var(--ease-out), box-shadow var(--dur-sm) var(--ease-out); }
.stw-box:focus-within { transform: translateY(-2px); box-shadow: var(--shadow-md); }

@media (max-width: 760px) {

  const grid = [];
  for (let y = 0; y < size; y++) { const row = []; for (let x = 0; x < size; x++) row.push(rand() > 0.5 ? 1 : 0); grid.push(row); }

};

window.__genCode = function () {

<script type="text/babel">
// ReflectIt: 3D "Perle" (glass sphere) as the sole brand mark.
// No rectangular icon, no mirror.

function Pearl({ size = 48, floating = true, paused = false }) {
  const s = size;
  const id = React.useId ? React.useId().replace(/:/g, '') : `p${Math.random().toString(36).slice(2, 8)}`;
  const coreId   = `pearl-core-${id}`;
  const rimId    = `pearl-rim-${id}`;
  const shineId  = `pearl-shine-${id}`;
  const shadowId = `pearl-shadow-${id}`;

  const pad = s * 0.08;
  const d = s - pad * 2;
  const cx = s / 2, cy = s / 2;
  const r = d / 2;

  // Cursor-tracked specular highlight.
  // Light position is normalized to [0..1] inside the SVG box, but it can extend
  // BEYOND the box (we clamp to [-0.4 .. 1.4]) so the catchlight slides naturally
  // toward the cursor even when the cursor is well outside the pearl — like a
  // real light source moving around it.
  const wrapRef = React.useRef(null);
  const [light, setLight] = React.useState({ x: 0.32, y: 0.28 });

  React.useEffect(() => {
    if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) return;
    let raf = 0, pending = null;
    const onMove = (e) => {
      pending = e;
      if (raf) return;
      raf = requestAnimationFrame(() => {
        raf = 0;
        const el = wrapRef.current;
        if (!el || !pending) return;
        const rect = el.getBoundingClientRect();
        const center = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        // Vector from pearl center to cursor.
        const dx = pending.clientX - center.x;
        const dy = pending.clientY - center.y;
        const dist = Math.hypot(dx, dy);
        // Specular position is OPPOSITE to where the light comes from?
        // No — the bright spot appears on the side facing the light. So highlight
        // moves TOWARD the cursor. Map cursor offset (in units of pearl radius) to
        // a normalized 0..1 position, soft-clamped so it slows as it approaches edge.
        const norm = Math.min(dist / (r * 2.5), 1); // 1 when cursor is far away
        const ux = dist === 0 ? 0 : dx / dist;
        const uy = dist === 0 ? 0 : dy / dist;
        // Highlight offset from center, in normalized SVG space (0..1).
        // Max offset = 0.42 from center (0.5), so range ~[0.08 .. 0.92].
        const offset = norm * 0.42;
        setLight({ x: 0.5 + ux * offset, y: 0.5 + uy * offset });
      });
    };
    window.addEventListener('pointermove', onMove, { passive: true });
    return () => {
      window.removeEventListener('pointermove', onMove);
      if (raf) cancelAnimationFrame(raf);
    };
  }, [r]);

  // Core gradient also subtly shifts so the shaded side rotates with the light.
  const coreCx = (1 - light.x) * 0.5 + light.x * 0.7; // tug toward light
  const coreCy = (1 - light.y) * 0.5 + light.y * 0.7;

  return (
    <div
      ref={wrapRef}
      className={'pearl-wrap' + (floating ? ' is-floating' : '') + (paused ? ' is-paused' : '')}
      style={{ width: s, height: s }}
      aria-hidden="true"
    >
      <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id={coreId} cx={coreCx} cy={coreCy} r="0.9">
            <stop offset="0%"   stopColor="#FFC8A8" />
            <stop offset="28%"  stopColor="#FF8A5C" />
            <stop offset="62%"  stopColor="#E85A7A" />
            <stop offset="100%" stopColor="#7A1F4A" />
          </radialGradient>
          <radialGradient id={rimId} cx={1 - light.x} cy={1 - light.y} r="0.55">
            <stop offset="0%"   stopColor="rgba(255,150,120,0.55)" />
            <stop offset="60%"  stopColor="rgba(255,150,120,0)" />
          </radialGradient>
          <radialGradient id={shineId} cx={light.x} cy={light.y} r="0.28">
            <stop offset="0%"   stopColor="rgba(255,255,255,0.95)" />
            <stop offset="60%"  stopColor="rgba(255,255,255,0.15)" />
            <stop offset="100%" stopColor="rgba(255,255,255,0)" />
          </radialGradient>
          <radialGradient id={shadowId} cx="0.5" cy="0.5" r="0.5">
            <stop offset="0%"   stopColor="rgba(40,10,25,0.35)" />
            <stop offset="100%" stopColor="rgba(40,10,25,0)" />
          </radialGradient>
        </defs>

        <ellipse cx={cx} cy={cy + r * 0.92} rx={r * 0.72} ry={r * 0.12} fill={`url(#${shadowId})`} />
        <circle cx={cx} cy={cy} r={r} fill={`url(#${coreId})`} />
        <circle cx={cx} cy={cy} r={r} fill={`url(#${rimId})`} />
        <circle cx={cx} cy={cy} r={r} fill={`url(#${shineId})`} />
        {/* Catchlight — small bright dot that tracks the cursor more aggressively */}
        <circle
          cx={cx + (light.x - 0.5) * d * 0.85}
          cy={cy + (light.y - 0.5) * d * 0.85}
          r={r * 0.06}
          fill="rgba(255,255,255,0.9)"
          style={{ transition: 'cx 80ms linear, cy 80ms linear' }}
        />
      </svg>
    </div>
  );
}

function LogoWordmark({ size = 20, color = 'var(--ink)' }) {
  return (
    <span
      className="logo-wordmark"
      style={{ fontSize: size, color }}
      aria-label="ReflectIt"
    >
      ReflectIt
    </span>
  );
}

function BrandLogo({ size = 'mini', rotate = false }) {
  const map = {
    mini:   { icon: 28, text: 15 },
    header: { icon: 36, text: 17 },
    xl:     { icon: 140, text: 44 },
  };
  const s = map[size] || map.mini;
  return (
    <span className={`brand-logo brand-logo-${size}`}>
      <Pearl size={s.icon} floating={rotate} />
      <LogoWordmark size={s.text} />
    </span>
  );
}

const LogoIcon = Pearl;

function IntroLogo({ onDone }) {
  const [phase, setPhase] = React.useState(1);

  React.useEffect(() => {
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      const id = setTimeout(() => { setPhase(3); onDone?.(); }, 50);
      return () => clearTimeout(id);
    }
    // Timeline:
    //   0–200ms    black curtain holds
    //   200–1300ms curtain fades away, revealing the static pearl underneath
    //   1300–1900ms wordmark letters reveal one by one
    //   1900–2700ms hold (reads: "ReflectIt")
    //   2700–3500ms whole composite fades out (phase 2)
    //   3500ms+    removed from DOM (phase 3)
    const t1 = setTimeout(() => setPhase(2), 2700);
    const t2 = setTimeout(() => { setPhase(3); onDone?.(); }, 3500);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, []);

  const word = 'ReflectIt';

  return (
    <React.Fragment>
      {/* Black curtain that lifts to reveal the pearl */}
      <div className={`intro-curtain intro-phase-${phase}`} aria-hidden="true" />
      <div className={`intro-logo intro-phase-${phase}`} aria-hidden={phase === 3}>
        {/* Soft warm halo behind the pearl as it's revealed */}
        <div className="intro-pearl-glow" aria-hidden="true" />
        <Pearl size={140} floating={false} />
        <span className="intro-wordmark">
          {word.split('').map((ch, i) => (
            <span
              key={i}
              className="intro-letter"
              style={{
                fontFamily: "'Newsreader', Georgia, serif",
                fontSize: 44,
                fontWeight: 500,
                fontStyle: 'italic',
                letterSpacing: '-0.01em',
                color: 'var(--ink)',
                lineHeight: 1,
              }}
            >
              {ch}
            </span>
          ))}
        </span>
      </div>
    </React.Fragment>
  );
}

function MirrorSymbol() {
  return (
    <div className="mirror-symbol" aria-hidden="true">
      <Pearl size={180} floating={true} />
    </div>
  );
}

Object.assign(window, { BrandLogo, LogoIcon, Pearl, LogoWordmark, IntroLogo, MirrorSymbol });

</script>

<script type="text/babel">
// Methods registry — central catalog
// To add a new method:
// 1. Create methods/<id>.jsx with StudentView + TeacherView components
// 2. Define window.METHOD_<NAME> = { id, title, group, emoji, description, didacticHint, StudentView, TeacherView }
// 3. Include it in ReflectIt.html before this file and add it to METHODS below

const METHODS = {};
[window.METHOD_FOUR_LEVELS, window.METHOD_WEATHER, window.METHOD_SUITCASE,
 window.METHOD_COUNTRY, window.METHOD_EXAM].forEach(m => { if (m) METHODS[m.id] = m; });

const METHOD_GROUPS = {
  structured: { id: 'structured', title: 'Strukturierte Reflexion', color: 'blue',
    description: 'Rational-kategoriale Reflexion über Lernprozess, Inhalte und Emotionen. Gut für systematisches Feedback.',
    Icon: () => <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="4" y1="10" x2="20" y2="10"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="4" x2="10" y2="20"/></svg> },
  creative: { id: 'creative', title: 'Kreativ-Reflexion', color: 'ocker',
    description: 'Metaphorische und bildhafte Reflexion. Fördert analoges Denken und erzeugt oft unerwartet tiefe Einsichten.',
    Icon: () => <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg> },
  performance: { id: 'performance', title: 'Leistungsreflexion', color: 'grey',
    description: 'Strukturierte Reflexion nach Klausuren oder anderen Leistungssituationen.',
    Icon: () => <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M4 20V10M10 20V4M16 20v-8M22 20H2"/></svg> },
};

function GroupPicker({ onPick, onCancel }) {
  return (
    <div className="group-picker">
      <div className="gp-head">
        <button className="link-btn" onClick={onCancel}>← zurück</button>
        <h2>Welche Methode möchten Sie nutzen?</h2>
        <p className="gp-sub">Wählen Sie eine Gruppe. Die Methode bestimmt, wie Ihre Klasse reflektiert.</p>
      </div>
      <div className="gp-grid stagger">
        {Object.values(METHOD_GROUPS).map(g => (
          <button key={g.id} className={`gp-card gp-${g.color}`} onClick={() => onPick(g.id)}>
            <div className="gp-icon"><g.Icon/></div>
            <h3>{g.title}</h3>
            <p>{g.description}</p>
          </button>
        ))}
      </div>
    </div>
  );
}

// After picking a group, either start directly (single-method groups) or offer creative picker
function MethodPicker({ group, onPick, onCancel }) {
  const inGroup = Object.values(METHODS).filter(m => m.group === group);

  // Single-method groups: start immediately
  React.useEffect(() => {
    if (group !== 'creative' && inGroup.length === 1) onPick(inGroup[0].id);
  }, [group]);

  if (group !== 'creative') {
    return <div className="m-empty" style={{margin: 40}}>Starte…</div>;
  }

  const [mode, setMode] = React.useState('choose');
  const [spinId, setSpinId] = React.useState(inGroup[0].id);
  const [rolled, setRolled] = React.useState(null);
  const [rolling, setRolling] = React.useState(false);

  const roll = () => {
    setRolling(true); setRolled(null);
    const start = Date.now(), dur = 1500;
    const tick = () => {
      const t = Date.now() - start;
      setSpinId(inGroup[Math.floor(Math.random() * inGroup.length)].id);
      if (t < dur) setTimeout(tick, 70 + (t / dur) * 140);
      else {
        const chosen = inGroup[Math.floor(Math.random() * inGroup.length)];
        setSpinId(chosen.id); setRolled(chosen); setRolling(false);
      }
    };
    tick();
  };

  if (mode === 'choose') return (
    <div className="group-picker">
      <div className="gp-head">
        <button className="link-btn" onClick={onCancel}>← zurück</button>
        <h2>Kreativ-Reflexion</h2>
        <p className="gp-sub">Methode zufällig ziehen oder gezielt auswählen?</p>
      </div>
      <div className="gp-grid gp-2 stagger">
        <button className="gp-card gp-ocker" onClick={() => { setMode('dice'); setRolled(null); }}>
          <div className="gp-icon"><svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="4" y="4" width="16" height="16" rx="3"/><circle cx="9" cy="9" r="1.3" fill="currentColor"/><circle cx="15" cy="15" r="1.3" fill="currentColor"/><circle cx="15" cy="9" r="1.3" fill="currentColor"/><circle cx="9" cy="15" r="1.3" fill="currentColor"/></svg></div>
          <h3>Überraschung</h3>
          <p>Wir würfeln eine Methode für Sie.</p>
        </button>
        <button className="gp-card gp-ocker" onClick={() => setMode('grid')}>
          <div className="gp-icon"><svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg></div>
          <h3>Gezielt wählen</h3>
          <p>Alle Kreativmethoden im Überblick.</p>
        </button>
      </div>
    </div>
  );

  if (mode === 'dice') {
    const shown = METHODS[spinId];
    return (
      <div className="group-picker">
        <div className="gp-head">
          <button className="link-btn" onClick={() => setMode('choose')}>← zurück</button>
          <h2>Methode würfeln</h2>
        </div>
        <div className="dice-stage">
          <div className={'dice-card ' + (rolling ? 'rolling ' : '') + (rolled ? 'landed' : '')}>
            <div className="dice-emoji">{shown.emoji}</div>
            <h3>{shown.title}</h3>
            <p>{shown.description}</p>
          </div>
          {!rolled && !rolling && (
            <button className="btn-primary btn-big" onClick={roll}>Methode würfeln</button>
          )}
          {rolled && !rolling && (
            <div className="dice-actions">
              <button className="btn-primary btn-big" onClick={() => onPick(rolled.id)}>Mit dieser Methode starten</button>
              <button className="link-btn" onClick={roll}>Neu würfeln</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  return (
    <div className="group-picker">
      <div className="gp-head">
        <button className="link-btn" onClick={() => setMode('choose')}>← zurück</button>
        <h2>Kreativmethoden</h2>
      </div>
      <div className="method-grid stagger">
        {inGroup.map(m => (
          <button key={m.id} className="method-card" onClick={() => onPick(m.id)}>
            <div className="method-emoji">{m.emoji}</div>
            <h3>{m.title}</h3>
            <p className="method-desc">{m.description}</p>
            <p className="method-hint">{m.didacticHint}</p>
          </button>
        ))}
      </div>
    </div>
  );
}

Object.assign(window, { METHODS, METHOD_GROUPS, GroupPicker, MethodPicker });

</script>
<script type="text/babel">
// Landing + session create

function Landing({ onCreate, onJoin }) {
  const [joinCode, setJoinCode] = React.useState('');
  const clean = joinCode.replace(/\s+/g,'').toUpperCase();
  const canJoin = clean.length === 6;

  // Intro plays once per browser session. Reload replays it.
  const [introDone, setIntroDone] = React.useState(() => {
    try { return sessionStorage.getItem('reflectit:introPlayed') === '1'; }
    catch { return false; }
  });
  const [introPhase2, setIntroPhase2] = React.useState(introDone); // controls header brand visibility

  // Reveal the header brand as the center intro fades out.
  React.useEffect(() => {
    if (introDone) return;
    const t = setTimeout(() => setIntroPhase2(true), 2700);
    return () => clearTimeout(t);
  }, [introDone]);

  const handleIntroDone = () => {
    try { sessionStorage.setItem('reflectit:introPlayed', '1'); } catch {}
    setIntroDone(true);
  };

  return (
    <div className="landing">
      {/* Flying intro — only when not yet played */}
      {!introDone && <window.IntroLogo onDone={handleIntroDone} />}

      <div className="landing-head">
        <div
          className="brand"
          style={{ opacity: introPhase2 ? 1 : 0, transition: 'opacity 500ms ease-out 200ms' }}
        >
          <window.BrandLogo size="mini" rotate={true} />
        </div>
        <div className="landing-meta">Reflexions-Werkzeug für Ihren Unterricht</div>
      </div>

      <div className="landing-hero">
        <div>
          <div className="hero-mirror" aria-hidden="true">
            <window.MirrorSymbol />
          </div>
          <h1>Am Ende der Stunde <em>kurz innehalten.</em></h1>
          <p className="lede">Sieben Reflexionsmethoden für das Stundenende oder nach Klausuren — anonym, ohne Login, in fünf Minuten.</p>
          <div className="privacy-note">
            <strong>Transparent &amp; datensparsam.</strong><br/>
            Keine Konten, keine Klarnamen. Alle Rückmeldungen werden anonym gespeichert und am Ende der Session gelöscht.
          </div>
        </div>
        <div className="landing-cards stagger">
          <button className="landing-card" onClick={onCreate}>
            <div>
              <div className="tag">Lehrkraft</div>

              <p>Methode wählen, Code und QR für die Klasse erzeugen.</p>
            </div>
            <div className="arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg></div>
          </button>
          <div className="landing-card" style={{display:'block', cursor:'default'}}>
            <div style={{display:'flex', gap:18, alignItems:'center'}}>
              <div>
                <div className="tag">Schüler:in</div>
                <h3>Session beitreten</h3>
                <p>Code eingeben oder QR scannen.</p>
              </div>
