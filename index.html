<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>ReflectIt</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: oklch(0.985 0.004 85);
  --bg-soft: oklch(0.97 0.005 85);
  --ink: oklch(0.22 0.01 260);
  --ink-soft: oklch(0.45 0.01 260);
  --ink-faint: oklch(0.68 0.008 260);
  --line: oklch(0.9 0.006 260);
  --line-soft: oklch(0.94 0.005 260);
  --cool: oklch(0.52 0.09 245);
  --cool-soft: oklch(0.93 0.03 245);
  --warm: oklch(0.66 0.15 55);
  --warm-soft: oklch(0.95 0.04 65);
  --accent-a: oklch(0.66 0.17 55);   /* warm coral */
  --accent-b: oklch(0.60 0.14 340);  /* magenta */
  --accent-c: oklch(0.58 0.13 245);  /* cool blue */
  --grad-hero: linear-gradient(135deg, oklch(0.97 0.035 65) 0%, oklch(0.96 0.04 340) 50%, oklch(0.95 0.04 245) 100%);
  --grad-accent: linear-gradient(135deg, var(--accent-a), var(--accent-b) 60%, var(--accent-c));
  --grad-warm: linear-gradient(135deg, oklch(0.72 0.16 45), oklch(0.64 0.18 25));
  --grad-cool: linear-gradient(135deg, oklch(0.62 0.12 250), oklch(0.55 0.14 280));
  --teacher-bg: oklch(0.19 0.025 265);
  --teacher-bg-2: oklch(0.16 0.03 280);
  --teacher-panel: oklch(0.24 0.025 265);
  --teacher-line: oklch(0.34 0.02 265);
  --teacher-ink: oklch(0.97 0.005 85);
  --teacher-ink-soft: oklch(0.72 0.015 265);
  --mood-1: oklch(0.62 0.18 25);
  --mood-2: oklch(0.72 0.14 45);
  --mood-3: oklch(0.78 0.04 90);
  --mood-4: oklch(0.72 0.12 150);
  --mood-5: oklch(0.62 0.15 160);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background:
    radial-gradient(ellipse 900px 600px at 85% -10%, oklch(0.95 0.06 55 / 0.55), transparent 60%),
    radial-gradient(ellipse 700px 500px at 0% 100%, oklch(0.94 0.05 280 / 0.4), transparent 55%),
    var(--bg);
  background-attachment: fixed;
  color: var(--ink);
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; color: inherit; }
textarea { resize: none; }

/* Shared */
.app-root { min-height: 100vh; }

/* Landing */
.landing {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 32px 24px 48px;
  max-width: 1100px;
  margin: 0 auto;
}
.landing-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 64px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  letter-spacing: -0.01em;
  font-size: 17px;
}
.brand-mark {
  width: 24px; height: 24px; border-radius: 7px;
  background: var(--grad-accent);
  position: relative;
  box-shadow: 0 4px 14px -4px oklch(0.6 0.18 20 / 0.5), inset 0 1px 0 oklch(1 0 0 / 0.3);
}
.brand-mark::after {
  content: ''; position: absolute; inset: 6px 5px 6px 12px;
  background: oklch(1 0 0 / 0.9); border-radius: 2px;
}
.landing-meta {
  font-size: 13px; color: var(--ink-soft);
}
.landing-hero {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 72px;
  align-items: start;
}
.landing-hero h1 {
  font-size: 64px;
  line-height: 0.98;
  letter-spacing: -0.035em;
  font-weight: 500;
  margin: 0 0 24px;
  text-wrap: balance;
}
.landing-hero h1 em {
  font-style: normal;
  background: var(--grad-accent);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.landing-hero p.lede {
  font-size: 17px;
  line-height: 1.55;
  color: var(--ink-soft);
  max-width: 42ch;
  margin: 0 0 40px;
}
.landing-cards {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.landing-card {
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 22px 24px;
  background: oklch(1 0 0 / 0.75);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  cursor: pointer;
  transition: border-color .2s, transform .2s, box-shadow .2s;
  text-align: left;
  display: flex;
  gap: 18px;
  align-items: center;
  position: relative;
  overflow: hidden;
}
.landing-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--grad-accent);
  opacity: 0;
  transition: opacity .2s;
}
.landing-card:hover {
  border-color: transparent;
  box-shadow: 0 12px 32px -12px oklch(0.4 0.1 280 / 0.25), 0 0 0 1px oklch(0.7 0.1 20 / 0.3);
  transform: translateY(-1px);
}
.landing-card:hover::before { opacity: 1; }
.landing-card .tag {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 4px;
}
.landing-card h3 {
  margin: 0;
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.landing-card p {
  margin: 4px 0 0;
  font-size: 14px;
  color: var(--ink-soft);
}
.landing-card .arrow {
  margin-left: auto;
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-soft);
  transition: background .15s, color .15s, border-color .15s;
  flex-shrink: 0;
}
.landing-card:hover .arrow { background: var(--grad-accent); color: white; border-color: transparent; }

.join-inline {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px dashed var(--line);
  display: flex;
  align-items: center;
  gap: 10px;
}
.join-inline input {
  flex: 1;
  border: 1px solid var(--line);
  background: var(--bg-soft);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 18px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  outline: none;
  font-family: 'JetBrains Mono', monospace;
}
.join-inline input:focus { border-color: var(--ink); background: white; }
.join-inline button {
  padding: 12px 20px;
  background: var(--grad-accent);
  color: white;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 4px 12px -4px oklch(0.6 0.18 20 / 0.45);
  transition: transform .15s, box-shadow .15s;
}
.join-inline button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 18px -6px oklch(0.6 0.18 20 / 0.55); }
.join-inline button:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }

.privacy-note {
  margin-top: 48px;
  padding: 20px 22px;
  border: 1px solid var(--line-soft);
  border-radius: 14px;
  background: linear-gradient(135deg, oklch(0.98 0.015 65 / 0.7), oklch(0.97 0.015 280 / 0.5));
  backdrop-filter: blur(6px);
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink-soft);
  max-width: 640px;
}
.privacy-note strong { color: var(--ink); font-weight: 500; }

/* ===== Student view ===== */
.student {
  min-height: 100vh;
  max-width: 520px;
  margin: 0 auto;
  padding: 20px 18px 120px;
  display: flex;
  flex-direction: column;
}
.student-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line-soft);
}
.student-head .left { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--ink-soft); }
.student-head .code { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.12em; color: var(--ink); font-weight: 500; }

.stepper {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 28px;
}
.stepper-pill {
  padding: 10px 8px 9px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: white;
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--ink-faint);
  text-align: center;
  transition: all .15s;
}
.stepper-pill.active {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}
.stepper-pill.done {
  border-color: var(--ink);
  color: var(--ink);
  background: white;
}
.stepper-pill .num { display: block; font-size: 10px; margin-bottom: 2px; opacity: 0.7; }

.level-header { margin-bottom: 24px; }
.level-header .eyebrow {
  font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 8px;
}
.level-header h2 {
  font-size: 30px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.08;
  margin: 0 0 10px;
  text-wrap: balance;
}
.level-header p {
  font-size: 15px;
  color: var(--ink-soft);
  margin: 0;
  line-height: 1.5;
}
.level-3 .level-header .eyebrow { color: var(--warm); }
.level-3 .level-header h2 { }

.field { margin-bottom: 28px; }
.field label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 10px;
  color: var(--ink);
}
.field .hint {
  font-size: 12px;
  color: var(--ink-faint);
  margin-top: 6px;
  font-weight: 400;
}
.field .optional { color: var(--ink-faint); font-weight: 400; font-size: 13px; margin-left: 6px; }

input.text, textarea.text {
  width: 100%;
  border: 1px solid var(--line);
  background: white;
  border-radius: 10px;
  padding: 14px 14px;
  font-size: 16px;
  outline: none;
  transition: border-color .15s;
  line-height: 1.5;
}
textarea.text { min-height: 92px; }
input.text:focus, textarea.text:focus { border-color: var(--ink); }

/* Scale 1-5 */
.scale {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}
.scale button {
  aspect-ratio: 1.2;
  border: 1px solid var(--line);
  background: white;
  border-radius: 10px;
  font-size: 20px;
  font-weight: 500;
  color: var(--ink-soft);
  transition: all .12s;
}
.scale button:hover { border-color: var(--ink-soft); }
.scale button.sel {
  background: var(--grad-cool);
  color: white;
  border-color: transparent;
  box-shadow: 0 4px 14px -4px oklch(0.55 0.14 260 / 0.5);
}
.scale-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 11px;
  color: var(--ink-faint);
}

/* Single choice */
.choices { display: flex; flex-direction: column; gap: 8px; }
.choice {
  border: 1px solid var(--line);
  background: white;
  border-radius: 10px;
  padding: 14px 16px;
  text-align: left;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all .12s;
  min-height: 50px;
}
.choice:hover { border-color: var(--ink-soft); }
.choice .dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 1.5px solid var(--line);
  flex-shrink: 0;
  transition: all .12s;
}
.choice.sel { border-color: transparent; background: linear-gradient(135deg, oklch(0.97 0.02 260), oklch(0.96 0.025 280)); box-shadow: 0 0 0 1.5px oklch(0.55 0.14 260 / 0.5); }
.choice.sel .dot { border-color: transparent; background: var(--grad-cool); box-shadow: inset 0 0 0 3px white; }

/* Mood barometer */
.mood {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.mood button {
  aspect-ratio: 1;
  border: 1px solid var(--line);
  background: white;
  border-radius: 14px;
  transition: all .15s;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.mood button svg { width: 60%; height: 60%; }
.mood button:hover { border-color: var(--ink-soft); }
.mood button.sel { border-color: transparent; background: linear-gradient(135deg, oklch(0.97 0.04 55), oklch(0.96 0.05 20)); box-shadow: 0 0 0 2px oklch(0.66 0.17 40 / 0.6), 0 6px 18px -6px oklch(0.66 0.17 40 / 0.4); }
.mood-scale-labels {
  display: flex; justify-content: space-between;
  margin-top: 10px;
  font-size: 11px;
  color: var(--ink-faint);
}

/* Footer nav on student */
.student-nav {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: linear-gradient(to top, var(--bg) 65%, transparent);
  padding: 16px 18px 22px;
  display: flex; gap: 10px;
  justify-content: space-between;
  max-width: 520px;
  margin: 0 auto;
}
.student-nav button {
  flex: 1;
  padding: 15px 18px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
  transition: all .15s;
}
.btn-ghost { border: 1px solid var(--line); background: white; color: var(--ink); }
.btn-ghost:hover { border-color: var(--ink); }
.btn-primary { background: var(--ink); color: var(--bg); box-shadow: 0 4px 14px -4px oklch(0.22 0.01 260 / 0.4); }
.btn-primary:hover { background: oklch(0.15 0.01 260); transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-submit { background: var(--grad-warm); color: white; box-shadow: 0 6px 18px -6px oklch(0.66 0.18 35 / 0.55); }
.btn-submit:hover { transform: translateY(-1px); box-shadow: 0 10px 24px -8px oklch(0.66 0.18 35 / 0.65); }

/* Submitted screen */
.submitted {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
  padding: 40px 24px;
  max-width: 480px;
  margin: 0 auto;
}
.submitted .check {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--grad-warm);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
  color: white;
  box-shadow: 0 14px 34px -10px oklch(0.66 0.18 35 / 0.55);
}
.submitted h2 {
  font-size: 34px; font-weight: 500; letter-spacing: -0.02em;
  margin: 0 0 14px; line-height: 1.1;
}
.submitted p { color: var(--ink-soft); font-size: 16px; line-height: 1.55; margin: 0 0 8px; }

/* ===== Teacher view ===== */
.teacher {
  min-height: 100vh;
  background:
    radial-gradient(ellipse 900px 500px at 90% 0%, oklch(0.35 0.12 25 / 0.25), transparent 60%),
    radial-gradient(ellipse 800px 500px at 0% 100%, oklch(0.35 0.12 280 / 0.3), transparent 55%),
    linear-gradient(180deg, var(--teacher-bg), var(--teacher-bg-2));
  color: var(--teacher-ink);
  padding: 28px 32px 40px;
  display: flex; flex-direction: column;
}
.teacher-head {
  display: flex; align-items: center; gap: 24px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--teacher-line);
  margin-bottom: 28px;
}
.teacher-head .brand { color: var(--teacher-ink); }
.teacher-head .brand-mark { background: var(--grad-accent); }
.teacher-head .brand-mark::after { background: oklch(0.18 0.02 265); }
.teacher-session {
  display: flex; align-items: baseline; gap: 14px; margin-left: 12px;
}
.teacher-session .label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teacher-ink-soft); }
.teacher-session .code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 30px; font-weight: 500;
  letter-spacing: 0.15em;
  background: var(--grad-accent);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.teacher-stats {
  margin-left: auto;
  display: flex; gap: 32px; align-items: center;
}
.teacher-stat .k { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teacher-ink-soft); }
.teacher-stat .v { font-size: 24px; font-weight: 500; letter-spacing: -0.01em; }
.teacher-stat .v small { font-size: 14px; color: var(--teacher-ink-soft); font-weight: 400; margin-left: 4px; }
.teacher-head-btns { display: flex; gap: 8px; }
.t-btn {
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--teacher-line);
  color: var(--teacher-ink);
  background: var(--teacher-panel);
  display: flex; align-items: center; gap: 6px;
  transition: background .15s, border-color .15s;
}
.t-btn:hover { background: oklch(0.32 0.015 260); }
.t-btn.danger:hover { background: oklch(0.35 0.08 25); border-color: oklch(0.55 0.15 25); }
.t-btn.primary { background: var(--teacher-ink); color: var(--teacher-bg); border-color: var(--teacher-ink); }
.t-btn.primary:hover { background: oklch(0.9 0.01 85); }

/* Tile grid */
.tiles {
  display: grid;
  grid-template-columns: 1.15fr 1fr;
  grid-template-rows: auto auto;
  gap: 20px;
  flex: 1;
}
.tile {
  background: linear-gradient(180deg, oklch(0.26 0.025 265 / 0.9), oklch(0.22 0.025 270 / 0.9));
  border: 1px solid var(--teacher-line);
  border-radius: 18px;
  padding: 24px 26px;
  display: flex; flex-direction: column;
  min-height: 0;
  overflow: hidden;
  position: relative;
  box-shadow: 0 1px 0 oklch(1 0 0 / 0.04) inset, 0 20px 40px -20px oklch(0 0 0 / 0.4);
}
.tile::before {
  content: '';
  position: absolute;
  top: 0; left: 24px; right: 24px;
  height: 1px;
  background: linear-gradient(90deg, transparent, oklch(0.7 0.1 40 / 0.5), oklch(0.6 0.1 280 / 0.5), transparent);
}
.tile-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; }
.tile-head .eyebrow {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--teacher-ink-soft);
  margin-bottom: 6px;
}
.tile-head h3 {
  margin: 0; font-size: 20px; font-weight: 500; letter-spacing: -0.01em;
}
.tile-head .tabs { display: flex; gap: 2px; background: oklch(0.2 0.012 260); border-radius: 8px; padding: 3px; }
.tile-head .tabs button {
  font-size: 12px; padding: 6px 10px; border-radius: 6px;
  color: var(--teacher-ink-soft);
}
.tile-head .tabs button.active { background: var(--teacher-panel); color: var(--teacher-ink); }

.tile-body { flex: 1; min-height: 0; display: flex; flex-direction: column; }

.empty {
  color: var(--teacher-ink-soft);
  font-size: 14px;
  text-align: center;
  padding: 40px 20px;
  border: 1px dashed var(--teacher-line);
  border-radius: 12px;
  margin: auto 0;
}

/* Word cloud */
.cloud {
  flex: 1;
  display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
  gap: 4px 14px;
  padding: 8px 0 20px;
  line-height: 1.1;
}
.cloud span {
  display: inline-block;
  color: var(--teacher-ink);
  letter-spacing: -0.01em;
  font-weight: 500;
  transition: color .2s;
}
.cloud span.w1 { color: var(--teacher-ink-soft); font-weight: 400; }
.cloud span.w2 { color: oklch(0.82 0.03 250); }
.cloud span.w3 { color: var(--teacher-ink); }
.cloud span.w4 { color: oklch(0.88 0.08 40); }
.cloud span.w5 { background: var(--grad-accent); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 600; }

.confidence {
  padding-top: 16px;
  border-top: 1px solid var(--teacher-line);
}
.confidence-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.confidence-head .k { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teacher-ink-soft); }
.confidence-head .avg { font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
.confidence-head .avg small { font-size: 13px; color: var(--teacher-ink-soft); margin-left: 4px; font-weight: 400; }
.confidence-bars {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
  align-items: end;
  height: 80px;
}
.confidence-bar {
  background: linear-gradient(180deg, oklch(0.62 0.13 250), oklch(0.48 0.1 270));
  border-radius: 6px 6px 0 0;
  position: relative;
  min-height: 4px;
  transition: height .4s;
  box-shadow: inset 0 1px 0 oklch(1 0 0 / 0.15);
}
.confidence-bar .count {
  position: absolute; top: -18px; left: 0; right: 0; text-align: center;
  font-size: 12px; color: var(--teacher-ink-soft);
}
.confidence-bar .lab {
  position: absolute; bottom: -22px; left: 0; right: 0; text-align: center;
  font-size: 12px; color: var(--teacher-ink-soft);
}
.confidence-wrap { padding-bottom: 24px; }

/* Bar chart */
.bars { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.bar-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; }
.bar-row .lab { font-size: 14px; color: var(--teacher-ink); }
.bar-row .track {
  grid-column: 1 / -1;
  height: 10px; background: oklch(0.22 0.012 260); border-radius: 6px;
  overflow: hidden;
}
.bar-row .fill { height: 100%; background: var(--grad-cool); border-radius: 6px; transition: width .5s; box-shadow: 0 0 12px oklch(0.6 0.14 260 / 0.3); }
.bar-row-inner {
  display: flex; justify-content: space-between; font-size: 13px; color: var(--teacher-ink-soft);
  margin-bottom: 4px;
}
.bar-row-inner .count { font-variant-numeric: tabular-nums; }

.private-section {
  margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--teacher-line);
}
.private-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.private-head .k { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teacher-ink-soft); display: flex; align-items: center; gap: 6px; }
.private-head .lock-badge { padding: 2px 7px; border-radius: 4px; font-size: 10px; background: oklch(0.35 0.06 55 / 0.25); color: oklch(0.85 0.1 55); letter-spacing: 0.05em; }
.private-list { max-height: 130px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding-right: 4px; }
.private-list::-webkit-scrollbar { width: 6px; }
.private-list::-webkit-scrollbar-thumb { background: var(--teacher-line); border-radius: 3px; }
.private-item {
  display: grid; grid-template-columns: 22px 1fr; gap: 10px;
  padding: 8px 10px;
  background: oklch(0.22 0.012 260);
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.45;
  color: var(--teacher-ink);
}
.private-item .num { color: var(--teacher-ink-soft); font-family: 'JetBrains Mono', monospace; font-size: 11px; text-align: right; padding-top: 2px; }
.private-hidden {
  font-size: 13px; color: var(--teacher-ink-soft);
  padding: 28px 12px; text-align: center;
  border: 1px dashed var(--teacher-line); border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.private-hidden button { font-size: 12px; padding: 6px 12px; border-radius: 6px; background: var(--teacher-line); color: var(--teacher-ink); }

/* Mood */
.mood-chart {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
  flex: 1; align-items: end;
  padding: 10px 0 36px;
}
.mood-col {
  position: relative;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  min-height: 60px;
}
.mood-col .svg-wrap { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; }
.mood-col .track {
  width: 100%;
  height: 160px;
  position: relative;
  background: oklch(0.22 0.012 260);
  border-radius: 10px;
  overflow: hidden;
}
.mood-col .fill {
  position: absolute; left: 0; right: 0; bottom: 0;
  border-radius: 10px;
  transition: height .5s;
}
.mood-col .count {
  position: absolute; top: 8px; left: 0; right: 0;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  color: var(--teacher-ink);
}
.mood-col .pct {
  font-size: 11px; color: var(--teacher-ink-soft); font-variant-numeric: tabular-nums;
}

/* Cards */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  overflow-y: auto;
  align-content: start;
  padding-right: 4px;
  flex: 1;
  min-height: 120px;
}
.cards-grid::-webkit-scrollbar { width: 6px; }
.cards-grid::-webkit-scrollbar-thumb { background: var(--teacher-line); border-radius: 3px; }
.q-card {
  border: 1px solid var(--teacher-line);
  background: linear-gradient(160deg, oklch(0.24 0.025 265), oklch(0.2 0.03 280));
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.45;
  color: var(--teacher-ink);
  cursor: pointer;
  transition: all .2s;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 84px;
  overflow: hidden;
}
.q-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--grad-accent);
  opacity: 0.5;
}
.q-card:hover { border-color: oklch(0.5 0.03 280); transform: translateY(-1px); box-shadow: 0 10px 24px -10px oklch(0 0 0 / 0.5); }
.q-card .num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--teacher-ink-soft); letter-spacing: 0.08em; }
.q-card .text { flex: 1; }
.q-card.done { opacity: 0.45; }
.q-card.done .text { text-decoration: line-through; }
.q-card .pickedup {
  position: absolute; top: 8px; right: 8px;
  font-size: 10px; color: var(--warm);
  background: oklch(0.35 0.08 55 / 0.25);
  padding: 2px 6px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.08em;
}

/* QR overlay */
.qr-corner {
  position: absolute;
  right: 28px; bottom: 24px;
  background: var(--teacher-panel);
  border: 1px solid var(--teacher-line);
  border-radius: 12px;
  padding: 14px 14px 12px;
  display: flex; flex-direction: column; align-items: center;
  gap: 8px;
  z-index: 10;
}
.qr-corner .qr-box {
  width: 88px; height: 88px;
  background: white;
  border-radius: 6px;
  padding: 6px;
}
.qr-corner .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teacher-ink-soft); }
.qr-corner .code { font-family: 'JetBrains Mono', monospace; font-size: 15px; letter-spacing: 0.15em; color: var(--teacher-ink); font-weight: 500; }

/* Session create */
.create {
  min-height: 100vh;
  padding: 40px 32px;
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
}
.create-content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  margin-top: 40px;
  align-items: start;
}
.create-left h1 { font-size: 52px; letter-spacing: -0.03em; font-weight: 500; line-height: 1; margin: 0 0 20px; }
.create-left p { font-size: 16px; color: var(--ink-soft); line-height: 1.55; margin: 0 0 24px; max-width: 42ch; }
.create-code-row { display: flex; align-items: center; gap: 20px; padding: 20px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); margin-bottom: 24px; }
.create-code-row .k { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-faint); margin-bottom: 8px; }
.create-code-row .code { font-family: 'JetBrains Mono', monospace; font-size: 64px; letter-spacing: 0.12em; font-weight: 500; line-height: 1; background: var(--grad-accent); -webkit-background-clip: text; background-clip: text; color: transparent; }
.create-right {
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 28px;
  background: oklch(1 0 0 / 0.75);
  backdrop-filter: blur(10px);
  display: flex; flex-direction: column; align-items: center;
  box-shadow: 0 20px 50px -20px oklch(0.4 0.1 280 / 0.25);
  position: relative;
  overflow: hidden;
}
.create-right::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--grad-accent);
}
.create-right .qr-large {
  width: 240px; height: 240px;
  background: white;
  border-radius: 8px;
}
.create-right .url { margin-top: 18px; font-size: 13px; color: var(--ink-soft); font-family: 'JetBrains Mono', monospace; word-break: break-all; text-align: center; }
.create-actions { display: flex; gap: 12px; margin-top: 32px; }
.create-actions button {
  padding: 14px 22px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 500;
}
.create-actions .primary { background: var(--grad-accent); color: white; box-shadow: 0 6px 18px -6px oklch(0.6 0.18 20 / 0.5); transition: transform .15s, box-shadow .15s; }
.create-actions .primary:hover { transform: translateY(-1px); box-shadow: 0 10px 24px -8px oklch(0.6 0.18 20 / 0.6); }
.create-actions .secondary { border: 1px solid var(--line); color: var(--ink); background: white; }
.create-actions .secondary:hover { border-color: var(--ink); }

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0;
  background: oklch(0.15 0.01 260 / 0.6);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 24px;
}
.modal {
  background: white;
  color: var(--ink);
  border-radius: 16px;
  padding: 28px 28px 22px;
  max-width: 440px; width: 100%;
}
.modal h3 { margin: 0 0 12px; font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
.modal p { margin: 0 0 20px; font-size: 14px; color: var(--ink-soft); line-height: 1.55; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
.modal-actions button { padding: 11px 18px; border-radius: 10px; font-size: 14px; font-weight: 500; }
.modal-actions .danger { background: oklch(0.55 0.18 25); color: white; }
.modal-actions .danger:hover { background: oklch(0.5 0.18 25); }
.modal-actions .ghost { border: 1px solid var(--line); color: var(--ink); }

.question-focus {
  background: white; color: var(--ink);
  border-radius: 16px;
  padding: 40px 36px 28px;
  max-width: 680px; width: 100%;
  display: flex; flex-direction: column;
  gap: 24px;
}
.question-focus .num { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--ink-faint); letter-spacing: 0.1em; }
.question-focus .text { font-size: 32px; line-height: 1.15; letter-spacing: -0.015em; font-weight: 500; text-wrap: balance; }
.question-focus .focus-actions { display: flex; gap: 10px; justify-content: space-between; align-items: center; margin-top: 8px; }
.question-focus .focus-actions .right { display: flex; gap: 10px; }
.question-focus .focus-actions button { padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; }
.focus-mark-done { background: var(--ink); color: var(--bg); }
.focus-mark-undo { border: 1px solid var(--line); color: var(--ink); }
.focus-nav { border: 1px solid var(--line); color: var(--ink-soft); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.focus-nav:hover { color: var(--ink); border-color: var(--ink); }

/* Projection mode */
.projection .tile { padding: 36px 40px; border-radius: 20px; }
.projection .tile-head h3 { font-size: 30px; }
.projection .tile-head .eyebrow { font-size: 14px; }
.projection .cloud span { font-weight: 600; }
.projection .confidence-head .avg { font-size: 36px; }
.projection .confidence-bars { height: 140px; }
.projection .mood-col .track { height: 260px; }
.projection .mood-col .count { font-size: 24px; }
.projection .bar-row .lab { font-size: 18px; }
.projection .q-card { font-size: 18px; line-height: 1.3; padding: 18px 20px; min-height: 110px; }
.projection .teacher-session .code { font-size: 44px; }

/* Small screens */
@media (max-width: 900px) {
  .landing-hero { grid-template-columns: 1fr; gap: 40px; }
  .landing-hero h1 { font-size: 46px; }
  .create-content { grid-template-columns: 1fr; gap: 40px; }
  .create-left h1 { font-size: 40px; }
  .create-code-row .code { font-size: 48px; }
  .tiles { grid-template-columns: 1fr; }
  .teacher { padding: 20px 18px; }
  .teacher-head { flex-wrap: wrap; gap: 14px; }
  .teacher-stats { width: 100%; order: 3; margin-left: 0; justify-content: space-between; }
  .qr-corner { display: none; }
  .mt-cols { grid-template-columns: 1fr !important; }
  .stw-grid { grid-template-columns: 1fr !important; }
  .exam-grid { grid-template-columns: 1fr !important; }
}

/* ===================== Method-shared ===================== */
.m-student {
  min-height: 100vh; max-width: 560px; margin: 0 auto;
  padding: 20px 18px 130px; display: flex; flex-direction: column;
}
.ms-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 22px; padding-bottom: 14px;
  border-bottom: 1px solid var(--line-soft);
}
.ms-head .code { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.12em; font-weight: 500; }
.ms-intro { margin-bottom: 22px; }
.ms-intro .eyebrow {
  font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-faint); margin-bottom: 8px;
}
.ms-intro .eyebrow.creative { color: oklch(0.6 0.12 65); }
.ms-intro .eyebrow.perf { color: oklch(0.5 0.05 260); }
.ms-intro h2 {
  font-size: 28px; font-weight: 500; letter-spacing: -0.02em;
  line-height: 1.1; margin: 0 0 10px; text-wrap: balance;
}
.ms-intro p { font-size: 15px; color: var(--ink-soft); margin: 0; line-height: 1.5; }
.ms-nav {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: linear-gradient(to top, var(--bg) 65%, transparent);
  padding: 16px 18px 22px; display: flex; gap: 10px;
  max-width: 560px; margin: 0 auto;
}
.ms-nav button {
  flex: 1; padding: 15px 18px; border-radius: 12px;
  font-size: 15px; font-weight: 500; transition: all .15s;
}
.m-err {
  background: oklch(0.95 0.05 25); color: oklch(0.4 0.15 25);
  padding: 12px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 16px;
}
.m-empty, .m-loading {
  color: var(--teacher-ink-soft); font-size: 15px;
  text-align: center; padding: 60px 20px;
  border: 1px dashed var(--teacher-line); border-radius: 12px;
  margin: 24px auto; max-width: 480px;
}
.m-loading { color: var(--ink-soft); border-color: var(--line); }

.m-teacher { width: 100%; }
.mt-cols { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; }
.mt-main { display: flex; flex-direction: column; gap: 18px; }
.mt-side {
  background: linear-gradient(180deg, oklch(0.26 0.025 265 / 0.9), oklch(0.22 0.025 270 / 0.9));
  border: 1px solid var(--teacher-line); border-radius: 18px;
  padding: 22px 22px 18px; display: flex; flex-direction: column; gap: 12px;
  min-height: 400px;
}
.mt-side-head { font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teacher-ink-soft); display: flex; justify-content: space-between; align-items: center; }
.mt-side-body { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; max-height: 500px; padding-right: 6px; }
.mt-side-body::-webkit-scrollbar { width: 6px; } .mt-side-body::-webkit-scrollbar-thumb { background: var(--teacher-line); border-radius: 3px; }
.mt-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--teacher-ink-soft); margin-bottom: 6px; }
.hint-box {
  font-size: 12px; color: var(--teacher-ink-soft);
  padding: 10px 14px; border-radius: 8px;
  background: oklch(0.22 0.012 260); margin-top: 16px;
  border-left: 2px solid oklch(0.5 0.08 60);
}
.link-btn { color: var(--teacher-ink-soft); text-decoration: underline; background: none; font-size: 12px; padding: 4px 8px; }
.link-btn:hover { color: var(--teacher-ink); }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  padding: 10px 14px; border-radius: 999px; border: 1px solid var(--line);
  background: white; font-size: 13px; color: var(--ink-soft); transition: all .12s;
}
.chip:hover { border-color: var(--ink-soft); }
.chip.sel { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.teacher-body { flex: 1; min-height: 0; }

/* Group picker */
.group-picker {
  min-height: 100vh; max-width: 1100px; margin: 0 auto;
  padding: 48px 32px 60px; display: flex; flex-direction: column;
}
.gp-head { margin-bottom: 36px; }
.gp-head h2 { font-size: 42px; font-weight: 500; letter-spacing: -0.025em; margin: 14px 0 10px; }
.gp-sub { color: var(--ink-soft); font-size: 16px; line-height: 1.5; max-width: 56ch; margin: 0; }
.gp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.gp-grid.gp-2 { grid-template-columns: repeat(2, 1fr); }
.gp-card {
  text-align: left; border: 1px solid var(--line); border-radius: 18px;
  padding: 28px 26px 26px; background: oklch(1 0 0 / 0.75); backdrop-filter: blur(8px);
  cursor: pointer; transition: all .2s; display: flex; flex-direction: column; gap: 12px;
}
.gp-card h3 { margin: 0; font-size: 22px; font-weight: 500; letter-spacing: -0.01em; }
.gp-card p { margin: 0; font-size: 14px; line-height: 1.5; color: var(--ink-soft); }
.gp-card:hover { transform: translateY(-3px); box-shadow: 0 22px 40px -20px oklch(0.4 0.08 260 / 0.3); border-color: transparent; }
.gp-icon {
  width: 56px; height: 56px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  color: white;
}
.gp-blue .gp-icon { background: linear-gradient(135deg, oklch(0.62 0.14 250), oklch(0.52 0.16 275)); }
.gp-ocker .gp-icon { background: linear-gradient(135deg, oklch(0.72 0.15 55), oklch(0.64 0.18 30)); }
.gp-grey .gp-icon { background: linear-gradient(135deg, oklch(0.58 0.03 260), oklch(0.42 0.025 265)); }

.method-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.method-card {
  text-align: left; border: 1px solid var(--line); border-radius: 16px;
  padding: 24px 22px; background: oklch(1 0 0 / 0.75); cursor: pointer;
  display: flex; flex-direction: column; gap: 8px; transition: all .2s;
}
.method-card:hover { transform: translateY(-2px); box-shadow: 0 18px 36px -18px oklch(0.4 0.08 260 / 0.3); }
.method-emoji { font-size: 34px; line-height: 1; }
.method-card h3 { margin: 6px 0 0; font-size: 18px; font-weight: 500; }
.method-desc { font-size: 13px; color: var(--ink-soft); margin: 0; line-height: 1.45; }
.method-hint { font-size: 12px; color: var(--ink-faint); margin: 4px 0 0; line-height: 1.4; font-style: italic; }

/* Dice stage */
.dice-stage { display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 40px 0; }
.dice-card {
  width: 100%; max-width: 460px; padding: 40px 36px 34px;
  border-radius: 22px; background: linear-gradient(160deg, oklch(0.98 0.02 55), oklch(0.96 0.04 40));
  border: 1px solid var(--line); display: flex; flex-direction: column; gap: 10px; align-items: center;
  text-align: center; transition: transform .15s;
}
.dice-card.rolling { animation: dice-jitter 0.1s infinite alternate; }
.dice-card.landed { animation: dice-pop 0.4s ease; }
.dice-emoji { font-size: 72px; line-height: 1; }
.dice-card h3 { margin: 6px 0 0; font-size: 26px; font-weight: 500; letter-spacing: -0.01em; }
.dice-card p { margin: 4px 0 0; color: var(--ink-soft); font-size: 15px; max-width: 42ch; }
@keyframes dice-jitter { from { transform: rotate(-2deg) translateY(0); } to { transform: rotate(2deg) translateY(-4px); } }
@keyframes dice-pop { 0% { transform: scale(0.9); } 50% { transform: scale(1.04); } 100% { transform: scale(1); } }
.dice-actions { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.btn-big { padding: 16px 28px; font-size: 16px; border-radius: 14px; }

/* Create session: chosen method pill + grading toggle */
.chosen-method-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 14px; border-radius: 999px;
  background: oklch(0.96 0.03 60); border: 1px solid oklch(0.9 0.04 60);
  font-size: 13px; color: oklch(0.35 0.06 40); font-weight: 500;
  margin-bottom: 18px;
}
.grading-toggle {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 0; margin: -12px 0 14px;
}
.grading-toggle .k {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--ink-faint); margin-right: 8px;
}
.grading-toggle button {
  padding: 8px 14px; border-radius: 8px; border: 1px solid var(--line);
  background: white; font-size: 13px; color: var(--ink-soft);
}
.grading-toggle button.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }

.classsize-in { display: flex; flex-direction: column; gap: 4px; }
.classsize-in span { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--teacher-ink-soft); }
.classsize-in input {
  width: 70px; padding: 6px 10px; border-radius: 8px;
  background: var(--teacher-panel); border: 1px solid var(--teacher-line);
  color: var(--teacher-ink); font-size: 14px; outline: none;
}

/* ===================== Weather ===================== */
.weather-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px;
}
.weather-tile {
  aspect-ratio: 1; border: 1px solid var(--line); border-radius: 16px;
  background: white; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; padding: 8px; transition: all .15s;
}
.weather-tile:hover { border-color: var(--ink-soft); }

// ReflectIt — Supabase storage layer w/ method + payload support
(function () {
  const SUPABASE_URL = 'https://rrmwucfjbebzsuwixibr.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_ZxesIBTttRfevo5BKJpiIA_8_VMa386';

    return;

  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    realtime: { params: { eventsPerSecond: 5 } },
  });
  window.__supabase = client;

  const channels = new Map();
  function ensureChannel(code) {
    if (channels.has(code)) return;
    const ch = client
      .channel(`session:${code}`)
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'responses', filter: `session_code=eq.${code}` },
        () => window.dispatchEvent(new CustomEvent('__reflectit_storage', { detail: { code } }))
      )
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'sessions', filter: `code=eq.${code}` },
        () => window.dispatchEvent(new CustomEvent('__reflectit_storage', { detail: { code, kind: 'session' } }))
      )
      .subscribe();
    channels.set(code, ch);
  }

  function rowToRecord(row) {
    // Backward compat: map legacy columns into payload if payload is null
    const payload = row.payload || {
      takeaway: row.takeaway || '',
      confidence: row.confidence ?? null,
      help: row.help || null,
      stuck: row.stuck || '',
      mood: row.mood ?? null,
      moodWhy: row.mood_why || '',
      openQ: row.open_q || '',
      transfer: row.transfer || '',
    };
    return {
      id: String(row.id),
      createdAt: new Date(row.created_at).getTime(),
      method: row.method || 'four_levels',
      payload,
    };
  }

  const storage = {
    // Session metadata
    async setSession(code, { method, imageSet = null, classSize = null }) {
      ensureChannel(code);
      const { error } = await client.from('sessions').upsert({
        code, method, image_set: imageSet, class_size: classSize,
      });
      if (error) throw error;
    },
    async getSession(code) {
      ensureChannel(code);
      const { data } = await client.from('sessions').select('*').eq('code', code).maybeSingle();
      if (!data) return null;
      return { code: data.code, method: data.method, imageSet: data.image_set, classSize: data.class_size };
    },

    // Responses
    async addResponse(code, method, payload) {
      ensureChannel(code);
      const { error } = await client.from('responses').insert({
        session_code: code, method, payload,
      });
      if (error) throw error;
    },
    async listResponses(code) {
      ensureChannel(code);
      const { data, error } = await client.from('responses').select('*').eq('session_code', code).order('created_at', { ascending: true });
      if (error) throw error;
      return (data || []).map(rowToRecord);
    },
    async markPickedUp(id, picked) {
      // Store pickup state in payload via merge
      const { data: row } = await client.from('responses').select('payload').eq('id', id).maybeSingle();

    },
    async endSession(code) {
      await client.from('responses').delete().eq('session_code', code);
      await client.from('sessions').delete().eq('code', code);
      const ch = channels.get(code);
      if (ch) { client.removeChannel(ch); channels.delete(code); }

window.__qrPattern = function (text) {
  if (typeof window.qrcode === 'function') {
    try {
      const q = window.qrcode(0, 'M');
      q.addData(text); q.make();
      const n = q.getModuleCount();
      const grid = [];
      for (let y = 0; y < n; y++) {
        const row = [];
        for (let x = 0; x < n; x++) row.push(q.isDark(y, x) ? 1 : 0);
        grid.push(row);
      }
      return grid;
    } catch (e) { console.warn('qr fail', e); }
  }
  // fallback 25x25 decorative
  const size = 25; let h = 2166136261;
  for (let i = 0; i < text.length; i++) { h ^= text.charCodeAt(i); h = Math.imul(h, 16777619); }
  const rand = () => { h ^= h << 13; h ^= h >>> 17; h ^= h << 5; return ((h >>> 0) % 1000) / 1000; };
  const grid = [];
  for (let y = 0; y < size; y++) { const row = []; for (let x = 0; x < size; x++) row.push(rand() > 0.5 ? 1 : 0); grid.push(row); }

};

<script type="text/babel">
// Four-Levels method — original student + teacher views
// (Was originally the whole app; now one method among many.)

const MoodSmiley = ({ level, color, size = 40 }) => {
  const mouths = { 1: 'M14 34 Q24 26 34 34', 2: 'M14 32 Q24 27 34 32', 3: 'M14 30 L34 30', 4: 'M14 28 Q24 33 34 28', 5: 'M14 26 Q24 36 34 26' };

      {level === 1 ? (
        <>
          <path d="M15 18 L21 22 M15 22 L21 18" />
          <path d="M27 18 L33 22 M27 22 L33 18" />

        <>
          <circle cx="18" cy={eyeY} r="1.4" fill={color} stroke="none" />
          <circle cx="30" cy={eyeY} r="1.4" fill={color} stroke="none" />
        </>
      )}
      <path d={mouths[level]} />
      {level === 5 && <path d="M14 26 Q24 36 34 26 L14 26 Z" fill={color} opacity="0.1" stroke="none" />}
    </svg>

};

const MOOD_COLORS = ['var(--mood-1)','var(--mood-2)','var(--mood-3)','var(--mood-4)','var(--mood-5)'];
const MOOD_LABELS = ['sehr frustriert','frustriert','neutral','motiviert','sehr motiviert'];
const HELP_OPTIONS = ['Gruppenarbeit','Diskussion im Plenum','Visualisierungen','Eigenes Nachdenken','Lehrer-Input','Etwas anderes'];
const LEVELS = [
  { num: 1, key: 'Kognitiv', title: 'Was habe ich gelernt?' },
  { num: 2, key: 'Prozess', title: 'Wie habe ich gelernt?' },
  { num: 3, key: 'Gefühl', title: 'Wie ging es mir dabei?' },
  { num: 4, key: 'Transfer', title: 'Wohin geht es?' },
];

function Stepper({ step, maxReached, onGo }) {
  return (
    <div className="stepper">
      {LEVELS.map((l, i) => {
        const active = step === i;
        const done = i < maxReached && !active;
        return (
          <button key={i} className={'stepper-pill ' + (active ? 'active' : done ? 'done' : '')} onClick={() => onGo(i)}>
            <span className="num">{String(l.num).padStart(2,'0')}</span>{l.key}
          </button>
        );
      })}
    </div>
  );
}

function ScaleInput({ value, onChange, lowLabel, highLabel }) {
  return (
    <div>
      <div className="scale">
        {[1,2,3,4,5].map(n => (
          <button key={n} type="button" className={value === n ? 'sel' : ''} onClick={() => onChange(n)}>{n}</button>

      <div className="mood-scale-labels"><span>sehr frustriert</span><span>sehr motiviert</span></div>

  );
}

function FourLevelsInnerStudent({ code, onSubmit, onExit }) {
  const [step, setStep] = React.useState(0);
  const [maxReached, setMaxReached] = React.useState(0);
  const [data, setData] = React.useState({});
  const [error, setError] = React.useState(null);
  const update = patch => setData(d => ({...d, ...patch}));
  const go = n => { const next = Math.max(0, Math.min(3, n)); setStep(next); setMaxReached(m => Math.max(m, next)); window.scrollTo({top:0, behavior:'smooth'}); };

  const submit = async () => {
    try {
      const payload = {
        takeaway: (data.takeaway||'').trim(),
        confidence: data.confidence || null,
        help: data.help || null,
        stuck: (data.stuck||'').trim(),
        mood: data.mood || null,
        moodWhy: (data.moodWhy||'').trim(),
        openQ: (data.openQ||'').trim(),
        transfer: (data.transfer||'').trim(),
      };
      await window.__store.addResponse(code, 'four_levels', payload);
      onSubmit();
    } catch (e) {
      setError('Beim Speichern ist ein Fehler aufgetreten. Bitte laden Sie die Seite neu.');
    }
  };

  const levelEl = step === 0 ? (
    <div className="level-body">
      <div className="field">
        <label>In einem Satz: Was nehmen Sie heute mit? <span className="optional">(optional)</span></label>
        <textarea className="text" value={data.takeaway||''} onChange={e => update({takeaway:e.target.value})} placeholder="z. B. Ich verstehe jetzt, wie …" maxLength={280}/>
      </div>
      <div className="field">
        <label>Wie sicher fühlen Sie sich im heutigen Thema?</label>
        <ScaleInput value={data.confidence} onChange={v => update({confidence:v})} lowLabel="unsicher" highLabel="sehr sicher"/>
      </div>
    </div>
  ) : step === 1 ? (
    <div className="level-body">
      <div className="field">
        <label>Was hat Ihnen heute am meisten geholfen?</label>
        <div className="choices">
          {HELP_OPTIONS.map(opt => (
            <button key={opt} type="button" className={'choice ' + (data.help === opt ? 'sel' : '')} onClick={() => update({help:opt})}>
              <span className="dot"/>{opt}
            </button>
          ))}
        </div>
      </div>
      <div className="field">
        <label>Wo sind Sie heute ins Stocken geraten? <span className="optional">(optional)</span></label>
        <textarea className="text" value={data.stuck||''} onChange={e => update({stuck:e.target.value})} maxLength={280}/>
        <div className="hint">Nur die Lehrkraft sieht diese Antwort — sie wird nicht projiziert.</div>
      </div>
    </div>
  ) : step === 2 ? (
    <div className="level-body">
      <div className="field">
        <label>Stimmungsbarometer</label>
        <MoodInput value={data.mood} onChange={v => update({mood:v})}/>
      </div>
      <div className="field">
        <label>Warum? <span className="optional">(freiwillig)</span></label>
        <textarea className="text" value={data.moodWhy||''} onChange={e => update({moodWhy:e.target.value})} maxLength={200}/>
      </div>
    </div>
  ) : (
    <div className="level-body">
      <div className="field">
        <label>Welche Frage bleibt heute offen? <span className="optional">(optional)</span></label>
        <textarea className="text" value={data.openQ||''} onChange={e => update({openQ:e.target.value})} maxLength={240}/>
      </div>
      <div className="field">
        <label>Was möchten Sie im Alltag weiterdenken oder anwenden? <span className="optional">(optional)</span></label>
        <textarea className="text" value={data.transfer||''} onChange={e => update({transfer:e.target.value})} maxLength={240}/>
      </div>
    </div>
  );

  return (
    <div className={`student level-${step+1}`}>
      <div className="student-head">
        <div className="left"><div className="brand"><div className="brand-mark"/>ReflectIt</div></div>
        <div className="code mono">{code}</div>
      </div>
      <Stepper step={step} maxReached={Math.max(maxReached, step)} onGo={go}/>
      <div className="level-header">
        <div className="eyebrow">Ebene {step+1} · {LEVELS[step].key}</div>
        <h2>{LEVELS[step].title}</h2>
        <p>Nehmen Sie sich einen Moment. Alle Felder sind freiwillig.</p>
      </div>
      {levelEl}
      {error && <div className="m-err">{error}</div>}
      <div className="student-nav">
        {step > 0 ? <button className="btn-ghost" onClick={() => go(step-1)}>Zurück</button>
          : <button className="btn-ghost" onClick={onExit}>Abbrechen</button>}
        {step < 3 ? <button className="btn-primary" onClick={() => go(step+1)}>Weiter</button>
          : <button className="btn-submit" onClick={submit}>Reflexion abschicken</button>}
      </div>
    </div>
  );
}

// Teacher view: 4 tiles
function WordCloud({ responses }) {
  const freq = {};
  responses.forEach(r => {
    const text = ((r.payload?.takeaway)||'').toLowerCase();
    text.split(/[\s.,;:!?"'„""()\-–—/]+/).forEach(w => {
      const clean = w.replace(/[^\wäöüß]/g,'').trim();
      if (clean.length < 3 || window.__STOPWORDS.has(clean)) return;
      freq[clean] = (freq[clean]||0) + 1;
    });
  });
  const entries = Object.entries(freq).sort((a,b) => b[1]-a[1]).slice(0,28);
  if (entries.length === 0) return <div className="empty">Noch keine Antworten — warten wir auf die Klasse…</div>;
  const max = entries[0][1];
  return (
    <div className="cloud">
      {entries.map(([w,n]) => {
        const scale = 0.6 + (n/max)*1.8;
        const tier = Math.min(5, Math.max(1, Math.round((n/max)*5)));
        return <span key={w} className={`w${tier}`} style={{fontSize:`${scale*14+8}px`, lineHeight:1.1}}>{w}</span>;
      })}
    </div>
  );
}

function ConfidenceBars({ responses }) {
  const counts = [0,0,0,0,0]; let total=0, sum=0;
  responses.forEach(r => { const c = r.payload?.confidence; if (c >= 1 && c <= 5) { counts[c-1]++; total++; sum += c; } });
  const max = Math.max(1, ...counts);
  const avg = total ? sum/total : 0;
  return (
    <div className="confidence-wrap">
      <div className="confidence-head">
        <div className="k">Sicherheit im Thema · Verteilung (1–5)</div>
        <div className="avg">{total ? avg.toFixed(1) : '–'}<small>/ 5 · {total} Stimmen</small></div>
      </div>
      <div className="confidence-bars">
        {counts.map((c,i) => (
          <div key={i} className="confidence-bar" style={{height:`${(c/max)*100}%`, background:`oklch(${0.42+i*0.08} 0.07 ${260-i*20})`}}>
            <div className="count">{c || ''}</div><div className="lab">{i+1}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function HelpBars({ responses }) {
  const counts = {}; HELP_OPTIONS.forEach(o => counts[o] = 0);
  responses.forEach(r => { const h = r.payload?.help; if (h && counts.hasOwnProperty(h)) counts[h]++; });
  const total = Object.values(counts).reduce((a,b) => a+b, 0);
  const max = Math.max(1, ...Object.values(counts));
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  if (total === 0) return <div className="empty">Noch keine Antworten zur Lernform.</div>;
  return (
    <div className="bars">
      {sorted.map(([opt,n]) => (
        <div key={opt} className="bar-row">
          <div className="bar-row-inner" style={{gridColumn:'1 / -1'}}><span className="lab">{opt}</span><span className="count">{n}</span></div>
          <div className="track"><div className="fill" style={{width:`${(n/max)*100}%`}}/></div>
        </div>
      ))}
    </div>
  );
}

function StuckList({ responses }) {
  const [shown, setShown] = React.useState(false);
  const items = responses.filter(r => r.payload?.stuck?.length > 0);
  return (
    <div className="private-section">
      <div className="private-head">
        <div className="k">🔒 Stolpersteine · nur für Sie<span className="lock-badge">privat</span></div>
        <button className="t-btn" style={{padding:'5px 10px', fontSize:12}} onClick={() => setShown(s => !s)}>{shown ? 'Verbergen' : 'Anzeigen'}</button>
      </div>
      {!shown ? <div className="private-hidden">Damit Schüler:innen beim Beamer nicht identifizierbar werden, bleiben diese Antworten verborgen.</div>
        : items.length === 0 ? <div className="private-hidden">Noch keine Stolpersteine gemeldet.</div>
        : <div className="private-list">{items.map((r,i) => (<div key={r.id} className="private-item"><span className="num">{String(i+1).padStart(2,'0')}</span><span>{r.payload.stuck}</span></div>))}</div>}
    </div>
  );
}

function MoodChart({ responses, projection }) {
  const counts = [0,0,0,0,0]; let total = 0;
  responses.forEach(r => { const m = r.payload?.mood; if (m >= 1 && m <= 5) { counts[m-1]++; total++; } });
  if (total === 0) return <div className="empty">Noch keine Stimmungen — die Klasse reflektiert noch.</div>;
  const max = Math.max(1, ...counts);
  return (
    <div className="mood-chart">
      {counts.map((c,i) => (
        <div key={i} className="mood-col">
          <div className="track"><div className="fill" style={{height:`${(c/max)*100}%`, background:MOOD_COLORS[i]}}/><div className="count">{c || '·'}</div></div>
          <div className="svg-wrap"><MoodSmiley level={i+1} color={MOOD_COLORS[i]} size={projection ? 52 : 36}/></div>
          <div className="pct">{Math.round((c/total)*100)}%</div>
        </div>
      ))}
    </div>
  );
}

function QuestionCards({ responses, pickedUp, onOpen, kind }) {
  const field = kind === 'openQ' ? 'openQ' : 'transfer';
  const items = responses.filter(r => r.payload?.[field]?.length > 0);
  if (items.length === 0) return <div className="empty">{kind === 'openQ' ? 'Noch keine offenen Fragen.' : 'Noch keine Transfer-Ideen.'}</div>;
  return (
    <div className="cards-grid">
      {items.map((r,i) => {
        const key = `${r.id}:${field}`;
        const done = pickedUp.has(key);
        return (
          <button key={key} className={'q-card ' + (done ? 'done' : '')} onClick={() => onOpen({ item: r, field, index: i+1 })}>
            <span className="num">{kind === 'openQ' ? 'Q' : 'T'}{String(i+1).padStart(2,'0')}</span>
            <span className="text">{r.payload[field]}</span>
            {done && <span className="pickedup">aufgegriffen</span>}
          </button>
        );
      })}
    </div>
  );
}

function FourLevelsInnerTeacher({ responses, projection }) {
  const [tile4Tab, setTile4Tab] = React.useState('open');
  const [pickedUp, setPickedUp] = React.useState(new Set());
  const [focus, setFocus] = React.useState(null);
  const toggle = key => setPickedUp(s => { const n = new Set(s); n.has(key) ? n.delete(key) : n.add(key); return n; });

  const field = focus?.field;
  const items = field ? responses.filter(r => r.payload?.[field]) : [];
  const focusNav = dir => {
    if (!focus) return;
    const idx = items.findIndex(r => r.id === focus.item.id);
    const next = items[(idx + dir + items.length) % items.length];
    if (next) setFocus({ item: next, field: focus.field, index: items.indexOf(next) + 1 });
  };

  return (
    <>
      <div className="tiles">
        <div className="tile">
          <div className="tile-head"><div><div className="eyebrow">Ebene 1 · Kognitiv</div><h3>Was die Klasse mitnimmt</h3></div></div>
          <div className="tile-body"><WordCloud responses={responses}/><ConfidenceBars responses={responses}/></div>
        </div>
        <div className="tile">
          <div className="tile-head"><div><div className="eyebrow">Ebene 2 · Prozess</div><h3>Was heute geholfen hat</h3></div></div>
          <div className="tile-body"><HelpBars responses={responses}/>{!projection && <StuckList responses={responses}/>}</div>
        </div>
        <div className="tile">
          <div className="tile-head"><div><div className="eyebrow">Ebene 3 · Stimmung</div><h3>Wie es der Klasse geht</h3></div></div>
          <div className="tile-body"><MoodChart responses={responses} projection={projection}/></div>
        </div>
        <div className="tile">
          <div className="tile-head">
            <div><div className="eyebrow">Ebene 4 · Transfer</div><h3>{tile4Tab === 'open' ? 'Offene Fragen' : 'Transfer-Ideen'}</h3></div>
            <div className="tabs">
              <button className={tile4Tab === 'open' ? 'active' : ''} onClick={() => setTile4Tab('open')}>Offene Fragen</button>
              <button className={tile4Tab === 'transfer' ? 'active' : ''} onClick={() => setTile4Tab('transfer')}>Transfer</button>
            </div>
          </div>
          <div className="tile-body">
            <QuestionCards responses={responses} pickedUp={pickedUp} onOpen={setFocus} kind={tile4Tab === 'open' ? 'openQ' : 'transfer'}/>
          </div>
        </div>
      </div>
      {focus && (
        <div className="modal-backdrop" onClick={() => setFocus(null)}>
          <div className="question-focus" onClick={e => e.stopPropagation()}>
            <div className="num">{focus.field === 'openQ' ? 'Offene Frage' : 'Transfer-Idee'} · {String(focus.index).padStart(2,'0')}</div>
            <div className="text">{focus.item.payload[focus.field]}</div>
            <div className="focus-actions">
              <button className="focus-nav" onClick={() => focusNav(-1)}>‹</button>
              <div className="right">
                {pickedUp.has(`${focus.item.id}:${focus.field}`)
                  ? <button className="focus-mark-undo" onClick={() => toggle(`${focus.item.id}:${focus.field}`)}>Als offen markieren</button>
                  : <button className="focus-mark-done" onClick={() => toggle(`${focus.item.id}:${focus.field}`)}>Als aufgegriffen markieren</button>}
                <button className="focus-nav" onClick={() => focusNav(1)}>›</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

Object.assign(window, { FourLevelsInnerStudent, FourLevelsInnerTeacher });

</script>
<script type="text/babel">

<script type="text/babel">
// Weather method — 8 icons, temperature slider, freetext
const WEATHER = [
  { id: 'sun', emoji: '☀️', label: 'Sonne', hint: 'klar, zuversichtlich' },
  { id: 'part', emoji: '🌤️', label: 'Sonne mit Wolken', hint: 'grundsätzlich gut, aber nicht ungetrübt' },
  { id: 'cloud', emoji: '☁️', label: 'Bewölkt', hint: 'gedämpft, ohne Richtung' },
  { id: 'fog', emoji: '🌫️', label: 'Nebel', hint: 'orientierungslos, unklar' },
  { id: 'rain', emoji: '🌧️', label: 'Regen', hint: 'mühsam, zäh' },
  { id: 'storm', emoji: '⛈️', label: 'Gewitter', hint: 'aufgewühlt, überfordert' },
  { id: 'snow', emoji: '❄️', label: 'Schnee', hint: 'still, gebremst' },
  { id: 'rainbow', emoji: '🌈', label: 'Regenbogen', hint: 'nach Schwierigkeit aufklarend' },
];

function WeatherStudent({ code, onSubmit, onExit }) {
  const [sel, setSel] = React.useState(null);
  const [temp, setTemp] = React.useState(18);
  const [text, setText] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState(null);

  const canSubmit = !!sel && !busy;

  const submit = async () => {
    setBusy(true); setErr(null);
    try {
      await window.__store.addResponse(code, 'weather', {
        weather: sel, temperature: temp, text: text.trim(),
      });
      onSubmit();
    } catch (e) { setErr('Speichern fehlgeschlagen. Bitte Seite neu laden.'); setBusy(false); }
  };

  return (
    <div className="m-student m-weather">
      <div className="ms-head">
        <div className="brand"><div className="brand-mark"/>ReflectIt</div>
        <div className="code mono">{code}</div>
      </div>
      <div className="ms-intro">
        <div className="eyebrow creative">Kreativ-Reflexion · Wetter</div>
        <h2>Wie war das Wetter heute für Sie?</h2>
        <p>Wählen Sie ein Wetter, das zu Ihrem Erleben passt.</p>
      </div>

      <div className="weather-grid">
        {WEATHER.map(w => (
          <button key={w.id}
            className={'weather-tile ' + (sel === w.id ? 'sel' : '')}
            onClick={() => setSel(w.id)}
            title={w.hint}>
            <div className="wemoji">{w.emoji}</div>
            <div className="wlabel">{w.label}</div>
          </button>
        ))}
      </div>

      <div className="field">
        <label>Temperatur · emotionale Intensität</label>
        <div className="temp-row">
          <span className="temp-end">kalt</span>
          <input type="range" min="-10" max="40" value={temp}
            onChange={e => setTemp(+e.target.value)} className="temp-slider" />
          <span className="temp-end">heiß</span>
        </div>
        <div className="temp-read">{temp}°</div>
      </div>

      <div className="field">
        <label>Was genau war das Wetter heute für Sie? <span className="optional">(optional)</span></label>
        <textarea className="text" value={text} onChange={e => setText(e.target.value)}
          placeholder="Ein Gedanke zu Ihrer Wetterwahl…" maxLength={280}/>
      </div>

      {err && <div className="m-err">{err}</div>}

      <div className="ms-nav">
        <button className="btn-ghost" onClick={onExit}>Abbrechen</button>
        <button className="btn-submit" disabled={!canSubmit} onClick={submit}>Abschicken</button>
      </div>
    </div>
  );
}

function WeatherTeacher({ responses, projection }) {
  const counts = {};
  WEATHER.forEach(w => counts[w.id] = 0);
  const texts = {}; // per weather
  let tempSum = 0, tempN = 0;
  responses.forEach(r => {
    const p = r.payload || {};
    if (p.weather && counts[p.weather] !== undefined) counts[p.weather]++;
    if (p.text) { (texts[p.weather] = texts[p.weather] || []).push({ id: r.id, text: p.text }); }
    if (typeof p.temperature === 'number') { tempSum += p.temperature; tempN++; }
  });
  const total = responses.length;
  const max = Math.max(1, ...Object.values(counts));
  const top = Object.entries(counts).sort((a,b) => b[1]-a[1])[0];
  const topWeather = top && top[1] > 0 ? WEATHER.find(w => w.id === top[0]) : null;
  const avgTemp = tempN ? (tempSum / tempN) : null;

  if (total === 0) return <div className="m-empty">Noch keine Rückmeldungen — warten wir auf die Klasse…</div>;

  return (
    <div className="m-teacher m-teacher-weather">
      <div className="mt-cols">
        <div className="mt-main">
          <div className="mt-eyebrow">Wetterlage der Klasse</div>
          <div className="weather-hero">
            <div className="weather-hero-emoji">{topWeather?.emoji || '—'}</div>
            <div className="weather-hero-lab">
              <div className="label">{topWeather?.label}</div>
              <div className="sub">{top[1]} von {total} · {topWeather?.hint}</div>
            </div>
          </div>
          <div className="weather-overview">
            {WEATHER.map(w => (
              <div key={w.id} className={'weather-bar ' + (counts[w.id] === 0 ? 'dim' : '')}>
                <div className="wb-emoji">{w.emoji}</div>
                <div className="wb-bar"><div className="wb-fill" style={{width: `${(counts[w.id]/max)*100}%`}}/></div>
                <div className="wb-count">{counts[w.id]}</div>
              </div>
            ))}
          </div>
          {avgTemp !== null && (
            <div className="temp-gauge">
              <div className="tg-head">
                <div className="k">Durchschnittstemperatur</div>
                <div className="v">{avgTemp.toFixed(1)}°</div>
              </div>
              <div className="tg-track">
                <div className="tg-ptr" style={{left: `${((avgTemp + 10) / 50) * 100}%`}}/>
                <div className="tg-lab left">kalt</div>
                <div className="tg-lab right">heiß</div>
              </div>
            </div>
          )}
        </div>
        {!projection && (
          <div className="mt-side">
            <div className="mt-side-head">Beschreibungen · nach Wetter</div>
            <div className="mt-side-body">
              {WEATHER.filter(w => texts[w.id]?.length).map(w => (
                <div key={w.id} className="ws-group">
                  <div className="ws-group-head"><span className="e">{w.emoji}</span> {w.label} · {texts[w.id].length}</div>
                  {texts[w.id].map(t => (
                    <div key={t.id} className="ws-item">{t.text}</div>
                  ))}
                </div>
              ))}
              {Object.keys(texts).length === 0 && <div className="ws-empty">Noch keine Kommentare.</div>}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

window.METHOD_WEATHER = {
  id: 'weather',
  title: 'Wetter-Reflexion',
  group: 'creative',
  emoji: '🌤️',
  description: 'Ein Wetter als Metapher für das heutige Erleben.',
  didacticHint: 'Niedrigschwellig, funktioniert auch bei Zurückhaltung. Gut für schnelle emotionale Rückmeldung.',
  StudentView: WeatherStudent,
  TeacherView: WeatherTeacher,
};

</script>

      <div className="ms-intro">

            <div className="stw-prompt">{b.prompt}</div>
            <textarea value={texts[b.id]}
              onChange={e => setTexts(t => ({...t, [b.id]: e.target.value}))}
              placeholder="Ein paar Sätze…" maxLength={320} className="text"/>
          </div>
        ))}
      </div>

      {err && <div className="m-err">{err}</div>}
      <div className="ms-nav">
        <button className="btn-ghost" onClick={onExit}>Abbrechen</button>
        <button className="btn-submit" disabled={!canSubmit} onClick={submit}>Abschicken</button>
      </div>
    </div>
  );
}

function SuitcaseTeacher({ responses, projection }) {
  const [picked, setPicked] = React.useState(new Set());
  const toggle = async (id, field) => {
    const k = `${id}:${field}`;
    const n = new Set(picked); n.has(k) ? n.delete(k) : n.add(k);
    setPicked(n);
  };

  const byBox = { suitcase: [], trash: [], washer: [] };
  responses.forEach(r => {
    const p = r.payload || {};
    STW_BOXES.forEach(b => { if (p[b.id]) byBox[b.id].push({ id: r.id, text: p[b.id] }); });
  });

  if (responses.length === 0) return <div className="m-empty">Noch keine Rückmeldungen…</div>;

  return (
    <div className="m-teacher stw-grid">
      {STW_BOXES.map(b => (
        <div key={b.id} className={`stw-col stw-${b.accent}`}>
          <div className="stw-col-head">
            <div className="emoji">{b.emoji}</div>
            <div>
              <div className="title">{b.title}</div>
              <div className="sub">{byBox[b.id].length} Karten</div>
            </div>
          </div>
          <div className="stw-cards">
            {byBox[b.id]
              .sort((a,b) => picked.has(`${b.id}:${b.title}`) ? -1 : 0)
              .map(item => {
                const k = `${item.id}:${b.id}`;
                const on = picked.has(k);
                return (
                  <div key={item.id} className={'stw-card ' + (on ? 'picked' : '')}
                    onClick={() => !projection && toggle(item.id, b.id)}>
                    <div className="stw-card-text">{item.text}</div>
                    {on && <div className="stw-card-tag">aufgegriffen</div>}
                  </div>
                );
              })}
            {byBox[b.id].length === 0 && <div className="stw-empty">—</div>}
          </div>
        </div>
      ))}
    </div>
  );
}
