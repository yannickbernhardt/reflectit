            <div className="join-inline">
              <input value={joinCode} onChange={e => setJoinCode(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6))} placeholder="A4K9P2" maxLength={6}/>

            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function QRBlock({ code, size = 120 }) {
  const url = `${window.location.origin}${window.location.pathname}#join=${code}`;
  const grid = React.useMemo(() => window.__qrPattern(url), [url]);
  const n = grid.length, cell = size / n;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} shapeRendering="crispEdges">
      <rect width={size} height={size} fill="white"/>
      {grid.map((row,y) => row.map((v,x) => v ? <rect key={`${x}-${y}`} x={x*cell} y={y*cell} width={cell} height={cell} fill="#111"/> : null))}
    </svg>
  );
}

function CreateSession({ code, method, onStart, onCancel, onGradingModeChange, gradingMode }) {
  const joinUrl = `${window.location.origin}${window.location.pathname}#join=${code}`;

    <div className="create">
      <div className="landing-head" style={{paddingBottom:0}}>
        <div className="brand"><window.BrandLogo size="mini" rotate={true}/></div>

      </div>
      <div className="create-content">

          <div className="chosen-method-pill"><span>{m.emoji}</span> {m.title}</div>
          <h1>Session bereit.</h1>
          <p>Teilen Sie den Code oder QR mit Ihrer Klasse. Die Schüler:innen gelangen direkt in die gewählte Methode — ohne Login.</p>
          <div className="create-code-row">
            <div><div className="k">Session-Code</div><div className="code mono">{code}</div></div>

          {method === 'exam' && (
            <div className="grading-toggle">
              <span className="k">Notensystem</span>
              <button className={gradingMode === 'grades' ? 'on' : ''} onClick={() => onGradingModeChange('grades')}>Noten 1–6</button>
              <button className={gradingMode === 'points' ? 'on' : ''} onClick={() => onGradingModeChange('points')}>Punkte 0–15</button>
            </div>
          )}
          <div className="create-actions">
            <button className="primary" onClick={onStart}>Dashboard öffnen →</button>
            <button className="secondary" onClick={() => navigator.clipboard?.writeText(joinUrl)}>Link kopieren</button>
          </div>

        <div className="create-right">
          <QRBlock code={code} size={240}/>
          <div className="url">{joinUrl}</div>
        </div>
      </div>

}

Object.assign(window, { Landing, CreateSession, QRBlock });

</script>
<script type="text/babel">
// Student dispatcher — reads session.method and renders the right StudentView
// Reused the QRBlock from landing (window.QRBlock)

function StudentView({ code, onExit }) {
  const [session, setSession] = React.useState(null);
  const [status, setStatus] = React.useState('loading'); // loading|ready|nosession|submitted|err
  const [err, setErr] = React.useState('');

  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const s = await window.__store.getSession(code);
        if (cancelled) return;
        if (!s) { setStatus('nosession'); return; }
        setSession(s); setStatus('ready');
      } catch (e) { setErr('Verbindung fehlgeschlagen. Bitte Seite neu laden.'); setStatus('err'); }
    })();
    return () => { cancelled = true; };
  }, [code]);

  if (status === 'loading') return <div className="m-loading">Session wird geladen …</div>;
  if (status === 'nosession') return (
    <div className="submitted">
      <h2>Session nicht gefunden</h2>
      <p>Der Code <b className="mono">{code}</b> ist nicht aktiv. Bitte prüfen Sie den Code oder fragen Sie die Lehrkraft.</p>
      <button className="btn-primary" style={{marginTop:24, padding:'12px 20px', borderRadius:12}} onClick={onExit}>Zurück</button>
    </div>
  );
  if (status === 'err') return <div className="m-err">{err}</div>;
  if (status === 'submitted') return (
    <div className="submitted">
      <div className="check"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M5 13l4 4L19 7"/></svg></div>
      <h2>Danke.</h2>
      <p>Ihre Antworten fließen anonym in die Auswertung der Klasse ein.</p>
      <p style={{marginTop:20, fontSize:13, color:'var(--ink-faint)'}}>Sie können dieses Fenster jetzt schließen.</p>
    </div>
  );

  const m = window.METHODS[session.method];
  if (!m) return <div className="m-err">Unbekannte Methode: {session.method}</div>;
  const Comp = m.StudentView;
  const extraProps = session.method === 'exam' ? { gradingMode: session.gradingMode || 'grades' } : {};

  return <Comp code={code} onExit={onExit} onSubmit={() => setStatus('submitted')} session={session} {...extraProps}/>;
}

Object.assign(window, { StudentView });

</script>
<script type="text/babel">
// Teacher dispatcher: fetches session.method + polls responses, dispatches to method's TeacherView

function TeacherView({ code, onExit }) {
  const [session, setSession] = React.useState(null);
  const [responses, setResponses] = React.useState([]);
  const [projection, setProjection] = React.useState(false);
  const [classSize, setClassSize] = React.useState('');
  const [showEnd, setShowEnd] = React.useState(false);

  const load = React.useCallback(async () => {
    try {
      if (!session) {
        const s = await window.__store.getSession(code);
        if (s) setSession(s);
      }
      const list = await window.__store.listResponses(code);
      setResponses(list);
    } catch (e) { /* silent */ }
  }, [code, session]);

  React.useEffect(() => {
    load();
    const poll = setInterval(load, 3000);
    const handler = () => load();
    window.addEventListener('__reflectit_storage', handler);
    return () => { clearInterval(poll); window.removeEventListener('__reflectit_storage', handler); };
  }, [load]);

  const endSession = async () => {
    await window.__store.endSession(code);
    onExit();
  };

  const count = responses.length;
  const estimate = classSize ? Number(classSize) : Math.max(25, Math.ceil(count * 1.3) || 25);

  const method = session?.method;
  const methodMeta = method ? window.METHODS[method] : null;

  return (
    <div className={`teacher ${projection ? 'projection' : ''}`}>
      <div className="teacher-head">
        <div className="brand"><window.BrandLogo size="mini" rotate={true}/></div>
        <div className="teacher-session">
          <div>
            <div className="label">Session · {methodMeta?.title || '—'}</div>
            <div className="code">{code}</div>
          </div>
        </div>
        <div className="teacher-stats">
          <div className="teacher-stat">
            <div className="k">Rückmeldungen</div>
            <div className="v">{count}<small>/ ~{estimate}</small></div>
          </div>
          {!projection && (
            <label className="classsize-in">
              <span>Klassengröße</span>
              <input type="number" min="1" max="60" value={classSize} onChange={e => setClassSize(e.target.value)} placeholder="–"/>
            </label>
          )}
          <div className="teacher-head-btns">
            <button className="t-btn" onClick={() => setProjection(p => !p)}>{projection ? 'Projektion aus' : 'Projektionsmodus'}</button>
            <button className="t-btn danger" onClick={() => setShowEnd(true)}>Session beenden</button>
          </div>
        </div>
      </div>

      <div className="teacher-body">
        {!methodMeta ? <div className="m-empty">Session wird geladen …</div>
          : <methodMeta.TeacherView code={code} responses={responses} projection={projection}/>}
      </div>

      {!projection && (
        <div className="qr-corner">
          <div className="label">Nachzügler</div>
          <div className="qr-box"><window.QRBlock code={code} size={76}/></div>
          <div className="code">{code}</div>
        </div>
      )}

      {showEnd && (
        <div className="modal-backdrop" onClick={() => setShowEnd(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Session beenden?</h3>
            <p>Alle Antworten dieser Session ({code}) werden unwiderruflich gelöscht.</p>
            <div className="modal-actions">
              <button className="ghost" onClick={() => setShowEnd(false)}>Abbrechen</button>
              <button className="danger" onClick={endSession}>Beenden &amp; Daten löschen</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

Object.assign(window, { TeacherView });

</script>
<script type="text/babel">
// App shell + routing

function App() {
  // routes: 'landing' | 'groupPick' | 'methodPick' | 'create' | 'teacher' | 'student'
  const [route, setRoute] = React.useState('landing');
  const [code, setCode] = React.useState(null);
  const [group, setGroup] = React.useState(null);
  const [method, setMethod] = React.useState(null);
  const [gradingMode, setGradingMode] = React.useState('grades');

  // Parse hash for join links
  React.useEffect(() => {
    const m = window.location.hash.match(/join=([A-Z0-9]{6})/i);
    if (m) { setCode(m[1].toUpperCase()); setRoute('student'); }
  }, []);

  const startGroupPick = () => setRoute('groupPick');

  const onPickGroup = (g) => {
    setGroup(g);
    // structured / performance groups only have one method — go straight
    const inGroup = Object.values(window.METHODS).filter(mm => mm.group === g);
    if (g !== 'creative' && inGroup.length === 1) {
      pickMethod(inGroup[0].id);
    } else {
      setRoute('methodPick');
    }
  };

  const pickMethod = async (mid) => {
    const c = window.__genCode();
    setCode(c);
    setMethod(mid);
    try {
      await window.__store.setSession(c, { method: mid });
    } catch (e) {
      alert('Session konnte nicht angelegt werden. Prüfen Sie die Datenbankverbindung.');
      return;
    }
    setRoute('create');
  };

  const startDashboard = async () => {
    // If exam, re-save session with gradingMode in payload (store as imageSet for now OR extend)
    if (method === 'exam') {
      // Persist gradingMode inside payload of session row? sessions table doesn't have a json col.
      // Quick workaround: stash in localStorage keyed to code, student dispatcher reads it.
      try { localStorage.setItem(`reflectit:${code}:gradingMode`, gradingMode); } catch {}
    }
    setRoute('teacher');
  };

  const joinSession = (c) => { setCode(c); setRoute('student'); };

  const reset = () => {
    setRoute('landing'); setCode(null); setGroup(null); setMethod(null);
    window.location.hash = '';
  };

  let view;
  if (route === 'groupPick') view = <window.GroupPicker onPick={onPickGroup} onCancel={reset}/>;
  else if (route === 'methodPick') view = <window.MethodPicker group={group} onPick={pickMethod} onCancel={() => setRoute('groupPick')}/>;
  else if (route === 'create') view = <window.CreateSession code={code} method={method} gradingMode={gradingMode} onGradingModeChange={setGradingMode} onStart={startDashboard} onCancel={reset}/>;
  else if (route === 'teacher') view = <window.TeacherView code={code} onExit={reset}/>;
  else if (route === 'student') view = <window.StudentView code={code} onExit={reset}/>;
  else view = <window.Landing onCreate={startGroupPick} onJoin={joinSession}/>;

  return (
    <React.Fragment>
      {view}
      <window.TweaksPanel/>
    </React.Fragment>
  );
}

// Hook for student-side gradingMode read
(function patchStore() {
  const origGet = window.__store.getSession;
  window.__store.getSession = async function(code) {
    const s = await origGet.call(this, code);
    if (s && s.method === 'exam') {
      try { s.gradingMode = localStorage.getItem(`reflectit:${code}:gradingMode`) || 'grades'; } catch {}
    }
    return s;
  };
})();

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
