<script type="text/babel">
// Exam reflection method — 4 sections

const GRADES_DE = ['1', '2', '3', '4', '5', '6'];
const POINTS = Array.from({length: 16}, (_, i) => String(15 - i));

const PREP_STRATS = ['Zusammenfassungen', 'Karteikarten', 'Altklausuren', 'Lerngruppe', 'Unterlagen lesen', 'Lern-App', 'Nichts Spezielles', 'Etwas anderes'];
const STUCK_ON = ['Zeitmanagement', 'Aufgabenverständnis', 'Fehlendes Wissen', 'Nervosität', 'Konzentration', 'Nichts', 'Etwas anderes'];

function ExamStudent({ code, onSubmit, onExit, gradingMode = 'grades' }) {
  const [step, setStep] = React.useState(0);
  const [d, setD] = React.useState({
    expected: '', got: '',
    prepIntensity: null, prepStrats: [], prepReflect: '',
    calm: null, stuckOn: [], stuckMoment: '',
    nextTime: '', needSupport: '',
  });
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState(null);
  const update = p => setD(v => ({...v, ...p}));
  const toggleIn = (key, val) => update({ [key]: d[key].includes(val) ? d[key].filter(x => x !== val) : [...d[key], val] });

  const opts = gradingMode === 'points' ? POINTS : GRADES_DE;

  const submit = async () => {
    setBusy(true); setErr(null);
    try {
      await window.__store.addResponse(code, 'exam', {
        ...d,
        expected: d.expected ? Number(d.expected) : null,
        got: d.got ? Number(d.got) : null,
        gradingMode,
        prepReflect: d.prepReflect.trim(),
        stuckMoment: d.stuckMoment.trim(),
        nextTime: d.nextTime.trim(),
        needSupport: d.needSupport.trim(),
      });
      onSubmit();
    } catch (e) { setErr('Speichern fehlgeschlagen.'); setBusy(false); }
  };

  const diff = (d.expected !== '' && d.got !== '')
    ? (Number(d.expected) - Number(d.got))
    : null;
  let diffText = '';
  if (diff !== null) {
    if (gradingMode === 'grades') {
      if (diff > 0) diffText = 'schlechter als erwartet';
      else if (diff < 0) diffText = 'besser als erwartet';
      else diffText = 'wie erwartet';
    } else {
      if (diff < 0) diffText = 'schlechter als erwartet';
      else if (diff > 0) diffText = 'besser als erwartet';
      else diffText = 'wie erwartet';
    }
  }

  return (
    <div className="m-student m-exam">
      <div className="ms-head">
        <div className="brand"><div className="brand-mark"/>ReflectIt</div>
        <div className="code mono">{code}</div>
      </div>
      <div className="exam-progress">
        {[0,1,2,3].map(i => <div key={i} className={'ep-step ' + (i <= step ? 'on' : '')}/>)}
      </div>

      {step === 0 && (
        <>
          <div className="ms-intro">
            <div className="eyebrow perf">Klausurreflexion · 1 / 4</div>
            <h2>Erwartung vs. Realität</h2>
          </div>
          <div className="field">
            <label>Welche {gradingMode === 'grades' ? 'Note' : 'Punktzahl'} hatten Sie erwartet?</label>
            <select className="text" value={d.expected} onChange={e => update({expected: e.target.value})}>
              <option value="">—</option>
              {opts.map(o => <option key={o} value={o}>{o}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Welche {gradingMode === 'grades' ? 'Note' : 'Punktzahl'} haben Sie bekommen?</label>
            <select className="text" value={d.got} onChange={e => update({got: e.target.value})}>
              <option value="">—</option>
              {opts.map(o => <option key={o} value={o}>{o}</option>)}
            </select>
          </div>
          {diffText && <div className="diff-box">{diffText}</div>}
        </>
      )}

      {step === 1 && (
        <>
          <div className="ms-intro">
            <div className="eyebrow perf">Klausurreflexion · 2 / 4</div>
            <h2>Vorbereitung</h2>
          </div>
          <div className="field">
            <label>Wie intensiv haben Sie sich vorbereitet?</label>
            <div className="scale">
              {[1,2,3,4,5].map(n => (
                <button key={n} type="button"
                  className={d.prepIntensity === n ? 'sel' : ''}
                  onClick={() => update({prepIntensity: n})}>{n}</button>
              ))}
            </div>
            <div className="scale-labels"><span>gar nicht</span><span>sehr intensiv</span></div>
          </div>
          <div className="field">
            <label>Welche Lernstrategien haben Sie genutzt? <span className="optional">(Mehrfachauswahl)</span></label>
            <div className="chips">
              {PREP_STRATS.map(s => (
                <button key={s}
                  className={'chip ' + (d.prepStrats.includes(s) ? 'sel' : '')}
                  onClick={() => toggleIn('prepStrats', s)}>{s}</button>
              ))}
            </div>
          </div>
          <div className="field">
            <label>Was würden Sie bei der Vorbereitung wiederholen? Was nicht? <span className="optional">(optional)</span></label>
            <textarea className="text" value={d.prepReflect} onChange={e => update({prepReflect: e.target.value})} maxLength={280}/>
          </div>
        </>
      )}

      {step === 2 && (
        <>
          <div className="ms-intro">
            <div className="eyebrow perf">Klausurreflexion · 3 / 4</div>
            <h2>Während der Klausur</h2>
          </div>
          <div className="field">
            <label>Wie ruhig waren Sie während der Klausur?</label>
            <div className="scale">
              {[1,2,3,4,5].map(n => (
                <button key={n} type="button"
                  className={d.calm === n ? 'sel' : ''}
                  onClick={() => update({calm: n})}>{n}</button>
              ))}
            </div>
            <div className="scale-labels"><span>sehr nervös</span><span>sehr ruhig</span></div>
          </div>
          <div className="field">
            <label>Wobei sind Sie ins Stocken geraten?</label>
            <div className="chips">
              {STUCK_ON.map(s => (
                <button key={s}
                  className={'chip ' + (d.stuckOn.includes(s) ? 'sel' : '')}
                  onClick={() => toggleIn('stuckOn', s)}>{s}</button>
              ))}
            </div>
          </div>
          <div className="field">
            <label>Welcher Moment war besonders schwierig oder entscheidend? <span className="optional">(optional)</span></label>
            <textarea className="text" value={d.stuckMoment} onChange={e => update({stuckMoment: e.target.value})} maxLength={280}/>
          </div>
        </>
      )}

      {step === 3 && (
        <>
          <div className="ms-intro">
            <div className="eyebrow perf">Klausurreflexion · 4 / 4</div>
            <h2>Strategie für die nächste Klausur</h2>
          </div>
          <div className="field">
            <label>Was nehmen Sie konkret für die nächste Klausur mit?</label>
            <textarea className="text" value={d.nextTime} onChange={e => update({nextTime: e.target.value})} maxLength={280}/>
          </div>
          <div className="field">
            <label>Wo möchten Sie Unterstützung?</label>
            <textarea className="text" value={d.needSupport} onChange={e => update({needSupport: e.target.value})} maxLength={280}/>
            <div className="hint">Nur Ihre Lehrkraft sieht diese Antwort — sie wird nicht projiziert.</div>
          </div>
        </>
      )}

      {err && <div className="m-err">{err}</div>}
      <div className="ms-nav">
        {step > 0 ? (
          <button className="btn-ghost" onClick={() => setStep(s => s-1)}>Zurück</button>
        ) : (
          <button className="btn-ghost" onClick={onExit}>Abbrechen</button>
        )}
        {step < 3 ? (
          <button className="btn-primary" onClick={() => setStep(s => s+1)}>Weiter</button>
        ) : (
          <button className="btn-submit" disabled={busy} onClick={submit}>Abschicken</button>
        )}
      </div>
    </div>
  );
}

function ExamTeacher({ responses, projection }) {
  let exSum = 0, exN = 0, gotSum = 0, gotN = 0;
  let prepSum = 0, prepN = 0;
  const prepCounts = Object.fromEntries(PREP_STRATS.map(s => [s, 0]));
  const stuckCounts = Object.fromEntries(STUCK_ON.map(s => [s, 0]));
  const supports = [];
  let gradingMode = 'grades';
  responses.forEach(r => {
    const p = r.payload || {};
    if (p.gradingMode) gradingMode = p.gradingMode;
    if (typeof p.expected === 'number') { exSum += p.expected; exN++; }
    if (typeof p.got === 'number') { gotSum += p.got; gotN++; }
    if (typeof p.prepIntensity === 'number') { prepSum += p.prepIntensity; prepN++; }
    (p.prepStrats || []).forEach(s => { if (prepCounts[s] !== undefined) prepCounts[s]++; });
    (p.stuckOn || []).forEach(s => { if (stuckCounts[s] !== undefined) stuckCounts[s]++; });
    if (p.needSupport) supports.push({ id: r.id, text: p.needSupport });
  });
  const total = responses.length;
  if (total === 0) return <div className="m-empty">Noch keine Rückmeldungen…</div>;

  const avgEx = exN ? (exSum/exN) : null;
  const avgGot = gotN ? (gotSum/gotN) : null;
  const avgPrep = prepN ? (prepSum/prepN) : null;
  const interp = avgEx !== null && avgGot !== null
    ? (gradingMode === 'grades'
        ? (avgGot > avgEx + 0.25 ? 'Klasse hat sich überschätzt' : avgGot < avgEx - 0.25 ? 'Klasse hat sich unterschätzt' : 'Realität ziemlich genau getroffen')
        : (avgGot < avgEx - 0.5 ? 'Klasse hat sich überschätzt' : avgGot > avgEx + 0.5 ? 'Klasse hat sich unterschätzt' : 'Realität ziemlich genau getroffen'))
    : '';

  const maxPrep = Math.max(1, ...Object.values(prepCounts));
  const maxStuck = Math.max(1, ...Object.values(stuckCounts));

  return (
    <div className="m-teacher m-exam-teacher">
      <div className="exam-grid">
        <div className="exam-tile">
          <div className="et-head">Erwartung vs. Realität</div>
          <div className="ev-bars">
            <div className="evb">
              <div className="evb-lab">erwartet</div>
              <div className="evb-v">{avgEx !== null ? avgEx.toFixed(1) : '–'}</div>
            </div>
            <div className="evb">
              <div className="evb-lab">bekommen</div>
              <div className="evb-v">{avgGot !== null ? avgGot.toFixed(1) : '–'}</div>
            </div>
          </div>
          <div className="ev-interp">{interp}</div>
        </div>

        <div className="exam-tile">
          <div className="et-head">Vorbereitung</div>
          <div className="et-sub">Durchschnittliche Intensität: {avgPrep !== null ? avgPrep.toFixed(1) : '–'} / 5</div>
          <div className="et-bars">
            {Object.entries(prepCounts).sort((a,b) => b[1]-a[1]).map(([s, n]) => (
              <div key={s} className="et-bar">
                <div className="etb-lab">{s}</div>
                <div className="etb-track"><div className="etb-fill" style={{width: `${(n/maxPrep)*100}%`}}/></div>
                <div className="etb-n">{n}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="exam-tile">
          <div className="et-head">Stolpersteine</div>
          <div className="et-bars">
            {Object.entries(stuckCounts).sort((a,b) => b[1]-a[1]).map(([s, n]) => {
              const topHighlight = n > 0 && n === maxStuck;
              return (
                <div key={s} className={'et-bar ' + (topHighlight ? 'hi' : '')}>
                  <div className="etb-lab">{s}</div>
                  <div className="etb-track"><div className="etb-fill" style={{width: `${(n/maxStuck)*100}%`}}/></div>
                  <div className="etb-n">{n}</div>
                </div>
              );
            })}
          </div>
        </div>

        {!projection && (
          <div className="exam-tile private">

<script type="text/babel">
// Methods registry — central catalog
// To add a new method:
// 1. Create methods/<id>.jsx with StudentView + TeacherView components
// 2. Define window.METHOD_<NAME> = { id, title, group, emoji, description, didacticHint, StudentView, TeacherView }
// 3. Include it in ReflectIt.html before this file and add it to METHODS below

const METHODS = {};
[window.METHOD_FOUR_LEVELS, window.METHOD_WEATHER, window.METHOD_SUITCASE,
 window.METHOD_COUNTRY, window.METHOD_EXAM].forEach(m => { if (m) METHODS[m.id] = m; });

const METHOD_GROUPS = {
  structured: { id: 'structured', title: 'Strukturierte Reflexion', color: 'blue',
    description: 'Rational-kategoriale Reflexion über Lernprozess, Inhalte und Emotionen. Gut für systematisches Feedback.',
    Icon: () => <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="4" y1="10" x2="20" y2="10"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="4" x2="10" y2="20"/></svg> },
  creative: { id: 'creative', title: 'Kreativ-Reflexion', color: 'ocker',
    description: 'Metaphorische und bildhafte Reflexion. Fördert analoges Denken und erzeugt oft unerwartet tiefe Einsichten.',
    Icon: () => <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg> },
  performance: { id: 'performance', title: 'Leistungsreflexion', color: 'grey',
    description: 'Strukturierte Reflexion nach Klausuren oder anderen Leistungssituationen.',
    Icon: () => <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M4 20V10M10 20V4M16 20v-8M22 20H2"/></svg> },
};

function GroupPicker({ onPick, onCancel }) {
  return (
    <div className="group-picker">
      <div className="gp-head">
        <button className="link-btn" onClick={onCancel}>← zurück</button>
        <h2>Welche Methode möchten Sie nutzen?</h2>
        <p className="gp-sub">Wählen Sie eine Gruppe. Die Methode bestimmt, wie Ihre Klasse reflektiert.</p>

      <div className="gp-grid">
        {Object.values(METHOD_GROUPS).map(g => (
          <button key={g.id} className={`gp-card gp-${g.color}`} onClick={() => onPick(g.id)}>
            <div className="gp-icon"><g.Icon/></div>
            <h3>{g.title}</h3>
            <p>{g.description}</p>
          </button>
        ))}
      </div>
    </div>
  );
}

// After picking a group, either start directly (single-method groups) or offer creative picker
function MethodPicker({ group, onPick, onCancel }) {
  const inGroup = Object.values(METHODS).filter(m => m.group === group);

  // Single-method groups: start immediately
  React.useEffect(() => {
    if (group !== 'creative' && inGroup.length === 1) onPick(inGroup[0].id);
  }, [group]);

  if (group !== 'creative') {
    return <div className="m-empty" style={{margin: 40}}>Starte…</div>;
  }

  const [mode, setMode] = React.useState('choose');
  const [spinId, setSpinId] = React.useState(inGroup[0].id);
  const [rolled, setRolled] = React.useState(null);
  const [rolling, setRolling] = React.useState(false);

  const roll = () => {
    setRolling(true); setRolled(null);
    const start = Date.now(), dur = 1500;
    const tick = () => {
      const t = Date.now() - start;
      setSpinId(inGroup[Math.floor(Math.random() * inGroup.length)].id);
      if (t < dur) setTimeout(tick, 70 + (t / dur) * 140);
      else {
        const chosen = inGroup[Math.floor(Math.random() * inGroup.length)];
        setSpinId(chosen.id); setRolled(chosen); setRolling(false);
      }
    };
    tick();
  };

  if (mode === 'choose') return (
    <div className="group-picker">
      <div className="gp-head">
        <button className="link-btn" onClick={onCancel}>← zurück</button>
        <h2>Kreativ-Reflexion</h2>
        <p className="gp-sub">Methode zufällig ziehen oder gezielt auswählen?</p>
      </div>
      <div className="gp-grid gp-2">
        <button className="gp-card gp-ocker" onClick={() => { setMode('dice'); setRolled(null); }}>
          <div className="gp-icon"><svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="4" y="4" width="16" height="16" rx="3"/><circle cx="9" cy="9" r="1.3" fill="currentColor"/><circle cx="15" cy="15" r="1.3" fill="currentColor"/><circle cx="15" cy="9" r="1.3" fill="currentColor"/><circle cx="9" cy="15" r="1.3" fill="currentColor"/></svg></div>
          <h3>Überraschung</h3>
          <p>Wir würfeln eine Methode für Sie.</p>
        </button>
        <button className="gp-card gp-ocker" onClick={() => setMode('grid')}>
          <div className="gp-icon"><svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg></div>
          <h3>Gezielt wählen</h3>
          <p>Alle Kreativmethoden im Überblick.</p>
        </button>
      </div>
    </div>
  );

  if (mode === 'dice') {
    const shown = METHODS[spinId];
    return (
      <div className="group-picker">
        <div className="gp-head">
          <button className="link-btn" onClick={() => setMode('choose')}>← zurück</button>
          <h2>Methode würfeln</h2>
        </div>
        <div className="dice-stage">
          <div className={'dice-card ' + (rolling ? 'rolling ' : '') + (rolled ? 'landed' : '')}>
            <div className="dice-emoji">{shown.emoji}</div>
            <h3>{shown.title}</h3>
            <p>{shown.description}</p>
          </div>
          {!rolled && !rolling && (
            <button className="btn-primary btn-big" onClick={roll}>Methode würfeln</button>
          )}
          {rolled && !rolling && (
            <div className="dice-actions">
              <button className="btn-primary btn-big" onClick={() => onPick(rolled.id)}>Mit dieser Methode starten</button>
              <button className="link-btn" onClick={roll}>Neu würfeln</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  return (
    <div className="group-picker">
      <div className="gp-head">
        <button className="link-btn" onClick={() => setMode('choose')}>← zurück</button>
        <h2>Kreativmethoden</h2>
      </div>
      <div className="method-grid">
        {inGroup.map(m => (
          <button key={m.id} className="method-card" onClick={() => onPick(m.id)}>
            <div className="method-emoji">{m.emoji}</div>
            <h3>{m.title}</h3>
            <p className="method-desc">{m.description}</p>
            <p className="method-hint">{m.didacticHint}</p>
          </button>
        ))}
      </div>
    </div>
  );
}

Object.assign(window, { METHODS, METHOD_GROUPS, GroupPicker, MethodPicker });

</script>
<script type="text/babel">
// Landing + session create

function Landing({ onCreate, onJoin }) {
  const [joinCode, setJoinCode] = React.useState('');
  const clean = joinCode.replace(/\s+/g,'').toUpperCase();
  const canJoin = clean.length === 4;

  return (
    <div className="landing">
      <div className="landing-head">
        <div className="brand"><div className="brand-mark"/>ReflectIt</div>
        <div className="landing-meta">Reflexions-Werkzeug für Ihren Unterricht</div>
      </div>

      <div className="landing-hero">
        <div>
          <h1>Am Ende der Stunde <em>kurz innehalten.</em></h1>
          <p className="lede">Sieben Reflexionsmethoden für das Stundenende oder nach Klausuren — anonym, ohne Login, in fünf Minuten.</p>
          <div className="privacy-note">
            <strong>Transparent &amp; datensparsam.</strong><br/>
            Keine Konten, keine Klarnamen. Alle Rückmeldungen werden anonym gespeichert und am Ende der Session gelöscht.
          </div>
        </div>
        <div className="landing-cards">
          <button className="landing-card" onClick={onCreate}>
            <div>
              <div className="tag">Lehrkraft</div>
              <h3>Neue Session starten</h3>
              <p>Methode wählen, Code und QR für die Klasse erzeugen.</p>
            </div>
            <div className="arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg></div>
          </button>
          <div className="landing-card" style={{display:'block', cursor:'default'}}>
            <div style={{display:'flex', gap:18, alignItems:'center'}}>
              <div>
                <div className="tag">Schüler:in</div>
                <h3>Session beitreten</h3>
                <p>Code eingeben oder QR scannen.</p>
              </div>
            </div>
            <div className="join-inline">
              <input value={joinCode} onChange={e => setJoinCode(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4))} placeholder="A4K9" maxLength={6}/>
              <button disabled={!canJoin} onClick={() => onJoin(clean)}>Beitreten</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function QRBlock({ code, size = 120 }) {
  const url = `${window.location.origin}${window.location.pathname}#join=${code}`;
  const grid = React.useMemo(() => window.__qrPattern(url), [url]);
  const n = grid.length, cell = size / n;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} shapeRendering="crispEdges">
      <rect width={size} height={size} fill="white"/>
      {grid.map((row,y) => row.map((v,x) => v ? <rect key={`${x}-${y}`} x={x*cell} y={y*cell} width={cell} height={cell} fill="#111"/> : null))}
    </svg>
  );
}

function CreateSession({ code, method, onStart, onCancel, onGradingModeChange, gradingMode }) {
  const joinUrl = `${window.location.origin}${window.location.pathname}#join=${code}`;
  const m = window.METHODS[method];
  return (
    <div className="create">
      <div className="landing-head" style={{paddingBottom:0}}>
        <div className="brand"><div className="brand-mark"/>ReflectIt</div>

          </div>
          {method === 'exam' && (
            <div className="grading-toggle">

              <button className={gradingMode === 'grades' ? 'on' : ''} onClick={() => onGradingModeChange('grades')}>Noten 1–6</button>
              <button className={gradingMode === 'points' ? 'on' : ''} onClick={() => onGradingModeChange('points')}>Punkte 0–15</button>
            </div>
          )}
          <div className="create-actions">
            <button className="primary" onClick={onStart}>Dashboard öffnen →</button>
            <button className="secondary" onClick={() => navigator.clipboard?.writeText(joinUrl)}>Link kopieren</button>
          </div>
        </div>
        <div className="create-right">
          <QRBlock code={code} size={240}/>
          <div className="url">{joinUrl}</div>
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { Landing, CreateSession, QRBlock });

</script>
<script type="text/babel">
// Student dispatcher — reads session.method and renders the right StudentView
// Reused the QRBlock from landing (window.QRBlock)

function StudentView({ code, onExit }) {
  const [session, setSession] = React.useState(null);
  const [status, setStatus] = React.useState('loading'); // loading|ready|nosession|submitted|err
  const [err, setErr] = React.useState('');

  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const s = await window.__store.getSession(code);
        if (cancelled) return;
        if (!s) { setStatus('nosession'); return; }
        setSession(s); setStatus('ready');
      } catch (e) { setErr('Verbindung fehlgeschlagen. Bitte Seite neu laden.'); setStatus('err'); }
    })();
    return () => { cancelled = true; };
  }, [code]);

  if (status === 'loading') return <div className="m-loading">Session wird geladen …</div>;
  if (status === 'nosession') return (
    <div className="submitted">
      <h2>Session nicht gefunden</h2>
      <p>Der Code <b className="mono">{code}</b> ist nicht aktiv. Bitte prüfen Sie den Code oder fragen Sie die Lehrkraft.</p>
      <button className="btn-primary" style={{marginTop:24, padding:'12px 20px', borderRadius:12}} onClick={onExit}>Zurück</button>
    </div>
  );
  if (status === 'err') return <div className="m-err">{err}</div>;
  if (status === 'submitted') return (
    <div className="submitted">
      <div className="check"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M5 13l4 4L19 7"/></svg></div>
      <h2>Danke.</h2>
      <p>Ihre Antworten fließen anonym in die Auswertung der Klasse ein.</p>
      <p style={{marginTop:20, fontSize:13, color:'var(--ink-faint)'}}>Sie können dieses Fenster jetzt schließen.</p>
    </div>
  );

  const m = window.METHODS[session.method];
  if (!m) return <div className="m-err">Unbekannte Methode: {session.method}</div>;
  const Comp = m.StudentView;
  const extraProps = session.method === 'exam' ? { gradingMode: session.gradingMode || 'grades' } : {};

  return <Comp code={code} onExit={onExit} onSubmit={() => setStatus('submitted')} session={session} {...extraProps}/>;
}

Object.assign(window, { StudentView });

</script>
<script type="text/babel">
// Teacher dispatcher: fetches session.method + polls responses, dispatches to method's TeacherView

function TeacherView({ code, onExit }) {
  const [session, setSession] = React.useState(null);
  const [responses, setResponses] = React.useState([]);
  const [projection, setProjection] = React.useState(false);
  const [classSize, setClassSize] = React.useState('');
  const [showEnd, setShowEnd] = React.useState(false);

  const load = React.useCallback(async () => {
    try {
      if (!session) {
        const s = await window.__store.getSession(code);
        if (s) setSession(s);
      }
      const list = await window.__store.listResponses(code);
      setResponses(list);
    } catch (e) { /* silent */ }
  }, [code, session]);

  React.useEffect(() => {
    load();
    const poll = setInterval(load, 3000);
    const handler = () => load();
    window.addEventListener('__reflectit_storage', handler);
    return () => { clearInterval(poll); window.removeEventListener('__reflectit_storage', handler); };
  }, [load]);

  const endSession = async () => {
    await window.__store.endSession(code);
    onExit();
  };

  const count = responses.length;
  const estimate = classSize ? Number(classSize) : Math.max(25, Math.ceil(count * 1.3) || 25);

  const method = session?.method;
  const methodMeta = method ? window.METHODS[method] : null;

  return (
    <div className={`teacher ${projection ? 'projection' : ''}`}>
      <div className="teacher-head">
        <div className="brand"><div className="brand-mark"/>ReflectIt</div>
        <div className="teacher-session">
          <div>
            <div className="label">Session · {methodMeta?.title || '—'}</div>
            <div className="code">{code}</div>
          </div>
        </div>
        <div className="teacher-stats">
          <div className="teacher-stat">
            <div className="k">Rückmeldungen</div>
            <div className="v">{count}<small>/ ~{estimate}</small></div>
          </div>
          {!projection && (
            <label className="classsize-in">
              <span>Klassengröße</span>
              <input type="number" min="1" max="60" value={classSize} onChange={e => setClassSize(e.target.value)} placeholder="–"/>
            </label>
          )}
          <div className="teacher-head-btns">
            <button className="t-btn" onClick={() => setProjection(p => !p)}>{projection ? 'Projektion aus' : 'Projektionsmodus'}</button>
            <button className="t-btn danger" onClick={() => setShowEnd(true)}>Session beenden</button>
          </div>
        </div>
      </div>

      <div className="teacher-body">
        {!methodMeta ? <div className="m-empty">Session wird geladen …</div>
          : <methodMeta.TeacherView code={code} responses={responses} projection={projection}/>}
      </div>

      {!projection && (
        <div className="qr-corner">
          <div className="label">Nachzügler</div>
          <div className="qr-box"><window.QRBlock code={code} size={76}/></div>
          <div className="code">{code}</div>
        </div>
      )}

      {showEnd && (
        <div className="modal-backdrop" onClick={() => setShowEnd(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Session beenden?</h3>
            <p>Alle Antworten dieser Session ({code}) werden unwiderruflich gelöscht.</p>
            <div className="modal-actions">
              <button className="ghost" onClick={() => setShowEnd(false)}>Abbrechen</button>
              <button className="danger" onClick={endSession}>Beenden &amp; Daten löschen</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

Object.assign(window, { TeacherView });

</script>
<script type="text/babel">
// App shell + routing

function App() {
  // routes: 'landing' | 'groupPick' | 'methodPick' | 'create' | 'teacher' | 'student'
  const [route, setRoute] = React.useState('landing');
  const [code, setCode] = React.useState(null);
  const [group, setGroup] = React.useState(null);
  const [method, setMethod] = React.useState(null);
  const [gradingMode, setGradingMode] = React.useState('grades');

  // Parse hash for join links
  React.useEffect(() => {
    const m = window.location.hash.match(/join=([A-Z0-9]{4})/i);
    if (m) { setCode(m[1].toUpperCase()); setRoute('student'); }
  }, []);

  const startGroupPick = () => setRoute('groupPick');

  const onPickGroup = (g) => {
    setGroup(g);
    // structured / performance groups only have one method — go straight
    const inGroup = Object.values(window.METHODS).filter(mm => mm.group === g);
    if (g !== 'creative' && inGroup.length === 1) {
      pickMethod(inGroup[0].id);
    } else {
      setRoute('methodPick');
    }
  };

  const pickMethod = async (mid) => {
    const c = window.__genCode();
    setCode(c);
    setMethod(mid);
    try {
      await window.__store.setSession(c, { method: mid });
    } catch (e) {
      alert('Session konnte nicht angelegt werden. Prüfen Sie die Datenbankverbindung.');
      return;
    }
    setRoute('create');
  };

  const startDashboard = async () => {
    // If exam, re-save session with gradingMode in payload (store as imageSet for now OR extend)
    if (method === 'exam') {
      // Persist gradingMode inside payload of session row? sessions table doesn't have a json col.
      // Quick workaround: stash in localStorage keyed to code, student dispatcher reads it.
      try { localStorage.setItem(`reflectit:${code}:gradingMode`, gradingMode); } catch {}
    }
    setRoute('teacher');
  };

  const joinSession = (c) => { setCode(c); setRoute('student'); };

  const reset = () => {
    setRoute('landing'); setCode(null); setGroup(null); setMethod(null);
    window.location.hash = '';
  };

  if (route === 'groupPick') return <window.GroupPicker onPick={onPickGroup} onCancel={reset}/>;
  if (route === 'methodPick') return <window.MethodPicker group={group} onPick={pickMethod} onCancel={() => setRoute('groupPick')}/>;
  if (route === 'create') return <window.CreateSession code={code} method={method} gradingMode={gradingMode} onGradingModeChange={setGradingMode} onStart={startDashboard} onCancel={reset}/>;
  if (route === 'teacher') return <window.TeacherView code={code} onExit={reset}/>;
  if (route === 'student') return <window.StudentView code={code} onExit={reset}/>;
  return <window.Landing onCreate={startGroupPick} onJoin={joinSession}/>;
}

// Hook for student-side gradingMode read
(function patchStore() {
  const origGet = window.__store.getSession;
  window.__store.getSession = async function(code) {
    const s = await origGet.call(this, code);
    if (s && s.method === 'exam') {
      try { s.gradingMode = localStorage.getItem(`reflectit:${code}:gradingMode`) || 'grades'; } catch {}
    }
    return s;
  };
})();

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
